      h.startDate=newDate;applyHabitStartDateSkips(hid,h.startDate);
      if(newDate<oldDate){const start=new Date(newDate+'T00:00:00'),end=new Date(oldDate+'T00:00:00');Object.keys(D.months).forEach(k=>{const[ys,ms]=k.split('-');const mo=D.months[k];if(!mo.skips[hid])return;const days=dim(+ys,+ms-1);for(let d=1;d<=days;d++){const dt=new Date(+ys,+ms-1,d);if(dt>=start&&dt<end)mo.skips[hid][d]=false;}});}
      save();render();return;
    }
  }

function fmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-').map(Number);const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1];return mn+' '+d+(y!==new Date().getFullYear()?" '"+String(y).slice(2):'')}

  Object.keys(D.months).forEach(k=>{const[ys,ms]=k.split('-');write(+ys,+ms-1);});
  let y=CY,m=CM;
  while(y<startY||(y===startY&&m<=startM)){write(y,m);m++;if(m>11){y++;m=0;}}
}

function buildHzTable(){
  const days=dim(CY,CM);
  const today=new Date();
  const isCurMo=today.getFullYear()===CY&&today.getMonth()===CM;
  const todayD=isCurMo?today.getDate():-1;
  const isPastMonth=CY<today.getFullYear()||(CY===today.getFullYear()&&CM<today.getMonth());
  const t=document.createElement('table');
  t.className='tbl';t.id='hz-tbl';

  // colgroup: habit col fixed, day cols share remaining space equally, done + % fixed
  const cg=document.createElement('colgroup');
  const cHabit=document.createElement('col');cHabit.style.width=editMode?'180px':'100px';cg.appendChild(cHabit);
  const cDays=document.createElement('col');cDays.span=days;cg.appendChild(cDays);
  const cDone=document.createElement('col');cDone.style.width='56px';cg.appendChild(cDone);
  const cPct=document.createElement('col');cPct.style.width='56px';cg.appendChild(cPct);
  t.appendChild(cg);

  // ── THEAD: chart row + week-label row + day-header row ──
  const thead=document.createElement('thead');

  // Row A: Chart row — canvas embedded in th colSpan=days for guaranteed alignment
  const rA=document.createElement('tr');
  const cornerA=document.createElement('th');
  cornerA.className='sl st hz-chart-corner';
  cornerA.rowSpan=4;
  rA.appendChild(cornerA);
  const chartTh=document.createElement('th');
  chartTh.colSpan=days;
  chartTh.className='hz-chart-td';
  chartTh.innerHTML=`<div style="position:relative;height:180px;width:100%"><div style="position:absolute;top:8px;left:10px;z-index:1;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);white-space:nowrap;pointer-events:none">Slight Edge Curve</div><canvas id="hz-pc"></canvas></div>`;

  donePh1.className='sr sr-2 st hz-sum-th first-sum';

  donePh1.style.verticalAlign='bottom';
  donePh1.textContent='Done';
  const pctPh1=document.createElement('th');
  pctPh1.className='sr sr-1 st hz-sum-th';
  pctPh1.rowSpan=4;

  // Row B: Daily % row (corner + Done/% covered by rowSpan=4 above)

    rC.appendChild(th);
  });
  thead.appendChild(rC);

  // Row D: Day number headers (corner + Done/% covered by rowSpan=4 above)
  const rD=document.createElement('tr');
  for(let d=1;d<=days;d++){
    const dow=new Date(CY,CM,d).getDay();
    const isToday=d===todayD;
    const isWeekStart=dow===1&&d>1;
    const isFutureDay=false;
    const th=document.createElement('th');
    th.className='st hz-day-th'+(isToday?' today-col':'')+(isWeekStart?' hz-week-sep':'');
    th.innerHTML=`<span class="hd-num">${d}</span><span class="hd-dow">${DOW[dow]}</span>${!isFutureDay?`<button id="aar-btn-${d}" class="aar-btn${getAAR(d)?' aar-has':''}" onclick="event.stopPropagation();openAAR(${d})" title="After Action Review">✎</button>`:''}`;

  t.appendChild(thead);

  // ── TBODY: group rows + habit rows ──
  const tbody=document.createElement('tbody');
  activeGroups().forEach((g,gi)=>{
    // Group label row
    const grpTr=document.createElement('tr');
    const grpTd=document.createElement('td');
    grpTd.colSpan=days+3;
    grpTd.className='hz-grp-row';
    const badgeBg=g.color+'1A';
    if(editMode){

        <span class="dnd-grip">⠿</span>
        <div class="grp-badge" style="background:${badgeBg};color:${g.color}">
          <button class="color-dot-btn" style="display:block;background:${g.color}" onclick="openColorPop(event,'${g.id}')"></button>
          <input class="grp-name-in" value="${esc(g.name)}" style="color:${g.color}" onchange="renameGroup('${g.id}',this.value)" onclick="event.stopPropagation()"/>
        </div>
        <button class="btn" style="padding:2px 6px;font-size:10px;color:#EF4444;border-color:#FCA5A5" onclick="deleteGroup('${g.id}')">&#10005;</button>
        <button class="add-hbt-btn" onclick="addHabit('${g.id}')">+ Add Habit</button>
      </div>`;
      grpTr.draggable=true;
      grpTr.ondragstart=e=>{_dg={type:'group',gid:g.id};grpTr.classList.add('dnd-drag');e.dataTransfer.effectAllowed='move'};
      grpTr.ondragend=()=>{grpTr.classList.remove('dnd-drag');_dg=null};
      grpTr.ondragover=e=>{
        if(_dg?.type==='group'&&_dg.gid!==g.id){
          e.preventDefault();
          const{top,height}=grpTr.getBoundingClientRect();
          grpTr.classList.remove('dnd-ins-t','dnd-ins-b');
          grpTr.classList.add(e.clientY<top+height/2?'dnd-ins-t':'dnd-ins-b');
        } else if(_dg?.type==='habit'&&_dg.gid!==g.id){

        }
      };
      grpTr.ondragleave=()=>{grpTr.classList.remove('dnd-ins-t','dnd-ins-b')};
      grpTr.ondrop=e=>{
        e.preventDefault();grpTr.classList.remove('dnd-ins-t','dnd-ins-b');

      };
    } else {
      grpTd.innerHTML=`<div class="grp-badge" style="background:${badgeBg};color:${g.color}"><div class="grp-dot" style="background:${g.color}"></div>${esc(g.name)}</div>`;
    }
    grpTr.appendChild(grpTd);tbody.appendChild(grpTr);

    // Habit rows
    g.habits.filter(h=>!h.archived).forEach(h=>{
      const tr=document.createElement('tr');
      tr.className='hz-row';
      const nameTd=document.createElement('td');
      nameTd.className='sl hz-habit-td';
      if(editMode){
        const hfreq=h.freq&&h.freq.length<7?h.freq:[0,1,2,3,4,5,6];
        const hfreqBtns=['S','M','T','W','T','F','S'].map((lbl,i)=>`<button class="freq-day-btn${hfreq.includes(i)?' freq-on':''}" onclick="event.stopPropagation();toggleHabitFreqDay('${h.id}',${i})" title="${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][i]}">${lbl}</button>`).join('');
        nameTd.innerHTML=`<div style="display:flex;flex-direction:column;gap:3px;overflow:hidden">
          <div style="display:flex;align-items:center;gap:2px">
            <span class="dnd-grip" style="margin-right:1px">⠿</span>
            <input class="hbt-in" style="text-align:left;flex:1;min-width:0" value="${esc(h.name)}" onchange="renameHabit('${h.id}',this.value)" onclick="event.stopPropagation()"/>
            <span class="sd-pill" onclick="event.stopPropagation();openDatePicker(this)" title="Start date">⊙ ${fmtDate(h.startDate||todayStr())}<input type="date" value="${h.startDate||todayStr()}" onchange="changeHabitStartDate('${h.id}',this.value)"/></span>
            <button class="clr-btn" style="display:inline" onclick="clearHabitHistory('${h.id}')" title="Clear all history">⊗</button>
            <button class="del-btn" style="display:inline;flex-shrink:0" onclick="deleteHabit('${g.id}','${h.id}')" title="Archive">&#10005;</button>

          <div style="display:flex;gap:2px;padding-left:16px">${hfreqBtns}</div>

        tr.draggable=true;
        tr.ondragstart=e=>{_dg={type:'habit',gid:g.id,hid:h.id};tr.classList.add('dnd-drag');e.dataTransfer.effectAllowed='move'};
        tr.ondragend=()=>{tr.classList.remove('dnd-drag');_dg=null};
        tr.ondragover=e=>{
          if(_dg?.type==='habit'&&_dg.hid!==h.id){
            e.preventDefault();
            const{top,height}=tr.getBoundingClientRect();
            tr.classList.remove('dnd-ins-t','dnd-ins-b');
            tr.classList.add(e.clientY<top+height/2?'dnd-ins-t':'dnd-ins-b');
          }
        };
        tr.ondragleave=()=>{tr.classList.remove('dnd-ins-t','dnd-ins-b')};
        tr.ondrop=e=>{
          e.preventDefault();
          const{top,height}=tr.getBoundingClientRect();
          tr.classList.remove('dnd-ins-t','dnd-ins-b');
          _dropHabit(g.id,h.id,e.clientY<top+height/2);
        };
      } else {
        nameTd.innerHTML=`<div class="hz-habit-name">${esc(h.name)}</div><div class="hz-habit-grp" style="color:${g.color}">${esc(g.name)}</div>`;
      }
      tr.appendChild(nameTd);

      let rowDone=0,rowTotal=0;
      for(let d=1;d<=days;d++){
        const dow=new Date(CY,CM,d).getDay();
        const isToday=d===todayD;
        const isFuture=false;
        const isWeekStart=dow===1&&d>1;
        const chk=isChk(h.id,d);
        const skp=isSkip(h.id,d);
        const foff=h.freq&&h.freq.length<7&&!h.freq.includes(dow);
        const bstart=!chk&&h.startDate&&new Date(CY,CM,d)<new Date(h.startDate+'T00:00:00');
        if(!isFuture&&!skp&&!foff){rowDone+=chk?1:0;rowTotal++}
        const td=document.createElement('td');
        td.className='hz-chk-c'+(isToday?' today-col':'')+(isFuture?' future':'')+(isWeekStart?' hz-week-sep':'')+(foff?' freq-off-c':'');
        td.id=`hzcc-${h.id}-${d}`;
        td.dataset.color=g.color;
        if(!isFuture&&!foff) td.onclick=()=>doHzToggle(h.id,d,g.color);
        td.innerHTML=`<div class="chk-box${chk?' checked':skp?' skipped':foff?' freq-off':bstart?' before-start':''}" id="hzcb-${h.id}-${d}" style="background:${chk?g.color:'transparent'};border-color:${chk?g.color:'var(--border)'}"></div>`;
        tr.appendChild(td);
      }

      const pct=rowTotal?Math.floor(rowDone/rowTotal*100):0;
      const doneTd=document.createElement('td');doneTd.className='sr sr-2 hz-sum-td first-sum';doneTd.id=`hzds-${h.id}`;
      doneTd.innerHTML=`${rowDone}<span style="color:var(--text3);font-size:9px">/${rowTotal}</span>`;
      const pctTd=document.createElement('td');pctTd.className='sr sr-1 hz-sum-td';pctTd.id=`hzps-${h.id}`;
      const pc=(TIDE_GRADES.find(gr=>pct>=gr.min)||TIDE_GRADES[TIDE_GRADES.length-1]).color;
      pctTd.innerHTML=`<span style="color:${pc};font-weight:600">${pct}%</span><div style="margin-top:3px;height:3px;border-radius:2px;background:var(--border);overflow:hidden"><div style="height:100%;width:${pct}%;background:${pc};border-radius:2px"></div></div>`;
      tr.appendChild(doneTd);tr.appendChild(pctTd);
      tbody.appendChild(tr);
    });
  });
  t.appendChild(tbody);
  return t;
}

function doHzToggle(hid,day,color){
  toggle(hid,day);
  // animate the checkbox
  const box=document.getElementById(`hzcb-${hid}-${day}`);
  if(box){
    const chk=isChk(hid,day);
    const skp=isSkip(hid,day);
    box.classList.toggle('checked',chk);
    box.classList.toggle('skipped',skp);
    box.style.background=chk?color:'transparent';
    box.style.borderColor=chk?color:'var(--border)';
    box.classList.remove('chk-pop');
    if(chk) requestAnimationFrame(()=>box.classList.add('chk-pop'));
  }
  // update habit's row summary
  const today=new Date();
  const isCurMo=today.getFullYear()===CY&&today.getMonth()===CM;
  const todayD=isCurMo?today.getDate():dim(CY,CM);
  const days=dim(CY,CM);
  let rowDone=0,rowTotal=0;
  for(let d=1;d<=todayD;d++){
    if(!isSkip(hid,d)){if(isChk(hid,d))rowDone++;rowTotal++;}
  }
  const pct=rowTotal?Math.floor(rowDone/rowTotal*100):0;
  const pc=(TIDE_GRADES.find(gr=>pct>=gr.min)||TIDE_GRADES[TIDE_GRADES.length-1]).color;
  const ds=document.getElementById(`hzds-${hid}`);
  const ps=document.getElementById(`hzps-${hid}`);
  if(ds) ds.innerHTML=`${rowDone}<span style="color:var(--text3);font-size:9px">/${rowTotal}</span>`;
  if(ps) ps.innerHTML=`<span style="color:${pc};font-weight:600">${pct}%</span><div style="margin-top:3px;height:3px;border-radius:2px;background:var(--border);overflow:hidden"><div style="height:100%;width:${pct}%;background:${pc};border-radius:2px"></div></div>`;
  // update daily % row (in thead)
  const {pct:dp}=dayProg(day);
  const dpEl=document.getElementById(`hzdp-${day}`);
  if(dpEl){const c=dp===100?'var(--green)':dp>=50?'var(--amber)':'var(--red)';dpEl.innerHTML=`<span style="color:${c};font-size:10px;font-weight:700">${dp}%</span>`}
  // refresh chart + stats
  updStats();
  updateHzChart();
  updTide();
}

function buildHzChart(){
  const canvas=document.getElementById('hz-pc');
  if(!canvas) return;
  if(hzChartInst){hzChartInst.destroy();hzChartInst=null}

  const days=dim(CY,CM);
  const dayTh=document.querySelector('.hz-day-th');
  const colW=dayTh?dayTh.offsetWidth:40;
  // Canvas is inside <th colSpan=days>, so canvas.width = days*colW exactly.
  // With x:{min:1,max:days} and symmetric padding of half a column:
  //   Day D center in canvas = colW*0.5 + (D-1)*colW = (D-0.5)*colW
  //   Table column D center  = (D-0.5)*colW  ← guaranteed pixel-perfect
  const padL=colW*0.5;
  const padR=colW*0.5;

  const {overall,groups}=cumulData();
  const cc=chartConf();
  const datasets=[];
  datasets.push({
    label:'Perfection',
    data:Array.from({length:days},(_,i)=>({x:i+1,y:Math.round((i+1)/days*100)})),
    borderColor:cc.ref,borderWidth:1.5,borderDash:[5,5],
    tension:0,fill:false,pointRadius:0,pointHoverRadius:0,
  });
  datasets.push({
    label:'Overall',data:overall,
    borderColor:cc.overall,backgroundColor:cc.fill,
    borderWidth:2.5,tension:.4,fill:'origin',pointRadius:0,pointHoverRadius:5,
  });
  groups.forEach(g=>{
    datasets.push({
      label:g.name,data:g.data,
      borderColor:g.color,backgroundColor:'transparent',
      borderWidth:1.5,tension:.4,fill:false,pointRadius:0,pointHoverRadius:4,
    });
  });
  hzChartInst=new Chart(canvas,{
    type:'line',
    data:{labels:Array.from({length:days},(_,i)=>i+1),datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:0},
      interaction:{mode:'index',intersect:false},
      layout:{padding:{left:padL,right:padR,top:26,bottom:0}},
      plugins:{
        legend:{position:'top',align:'end',labels:{boxWidth:20,boxHeight:2,font:{size:10,family:"'Inter',system-ui"},color:cc.legend,padding:10}},
        tooltip:{
          backgroundColor:cc.tipBg,titleColor:'#fff',bodyColor:cc.tipBdy,
          borderColor:cc.tipBdr,borderWidth:1,padding:9,
          titleFont:{size:11},bodyFont:{size:10},
          callbacks:{title:c=>`Day ${c[0].label}`,label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}
        }
      },
      scales:{
        x:{type:'linear',min:1,max:days,ticks:{stepSize:5,font:{size:10,family:"'Inter',system-ui"},color:cc.ticks,maxRotation:0},grid:{color:cc.grid},border:{display:false}},
        y:{min:0,max:100,ticks:{display:false,stepSize:25},grid:{color:cc.grid},border:{display:false}}
      }
    }
  });
  requestAnimationFrame(()=>{
    if(!hzChartInst||!hzChartInst.chartArea) return;
    const ds=hzChartInst.data.datasets.find(d=>d.label==='Overall');
    if(ds){ds.backgroundColor=chartFillGradient(hzChartInst.ctx,hzChartInst.chartArea);hzChartInst.update('none');}
  });
}

function updateHzChart(){
  if(!hzChartInst){buildHzChart();return}
  const {overall,groups}=cumulData();
  hzChartInst.data.datasets.forEach(ds=>{
    if(ds.label==='Overall') ds.data=overall;
    const g=groups.find(gg=>gg.name===ds.label);
    if(g) ds.data=g.data;
  });
  if(hzChartInst.chartArea){
    const ds=hzChartInst.data.datasets.find(d=>d.label==='Overall');
    if(ds) ds.backgroundColor=chartFillGradient(hzChartInst.ctx,hzChartInst.chartArea);
  }
  hzChartInst.options.animation={duration:400,easing:'easeOutQuart'};
  hzChartInst.update();
}

function mkFathomGrid(){
  const items=activeFathomItems();

  const cg=document.createElement('colgroup');
  const cH=document.createElement('col');cH.style.width=editMode?'180px':'100px';cg.appendChild(cH);
  const cD=document.createElement('col');cD.span=days;cD.style.width='34px';cg.appendChild(cD);
  const cDn=document.createElement('col');cDn.style.width='56px';cg.appendChild(cDn);
  const cP=document.createElement('col');cP.style.width='56px';cg.appendChild(cP);
  t.appendChild(cg);

  const thead=document.createElement('thead');

  // Row A: daily % row  +  Done/SE% spanning 3 rows
  const rA=document.createElement('tr');
  const cornerA=document.createElement('th');
  cornerA.className='sl st';cornerA.rowSpan=3;
  cornerA.style.cssText='padding:6px 8px;border-bottom:2px solid var(--border);vertical-align:bottom';

  rA.appendChild(cornerA);
  for(let d=1;d<=days;d++){
    const dow=new Date(CY,CM,d).getDay();
    const isToday=d===todayD,isFuture=false,isWeekStart=dow===1&&d>1;
    const {pct}=fathomDayProg(d);
    const td=document.createElement('td');
    td.id=`fdp-${d}`;
    td.className='st hz-chk-c'+(isToday?' today-col':'')+(isWeekStart?' hz-week-sep':'');
    td.style.cssText=`padding:3px 2px;cursor:default;background:${isToday?'var(--today-bg)':'var(--surface2)'};border-bottom:1px solid var(--border2)`;
    if(isFuture||!items.length) td.innerHTML=`<span style="color:var(--text3);font-size:9px">—</span>`;
    else{const fg=fathomGrade(pct);td.innerHTML=`<span style="color:${fgColor(fg)};font-size:10px;font-weight:700">${pct}%</span>`;}
    rA.appendChild(td);
  }
  const donePh=document.createElement('th');
  donePh.className='sr sr-2 st hz-sum-th first-sum';donePh.rowSpan=3;donePh.style.verticalAlign='bottom';donePh.textContent='Done';
  const pctPh=document.createElement('th');
  pctPh.className='sr sr-1 st hz-sum-th';pctPh.rowSpan=3;pctPh.style.verticalAlign='bottom';pctPh.textContent='SE %';
  rA.appendChild(donePh);rA.appendChild(pctPh);
  thead.appendChild(rA);

  // Row B: week labels
  const rB=document.createElement('tr');
  const fWkSpans=getWeekSpans(CY,CM);
  const fWkData={};
  fWkSpans.forEach(s=>{const lastD=todayD>0?Math.min(s.end,todayD):(isPastMonth?s.end:0);let done=0,total=0;for(let d=s.start;d<=lastD;d++){items.forEach(it=>{if(!isSkipFathom(it.id,d)){total++;if(isChkFathom(it.id,d))done++;}});}fWkData[s.week]=total>0?{pct:Math.round(done/total*100)}:null;});
  fWkSpans.forEach((ws,wi)=>{
    const th=document.createElement('th');
    th.className='st hz-week-hdr-th'+(wi>0?' week-start-sep':'');
    th.colSpan=ws.end-ws.start+1;
    th.style.position='relative';
    const wd=fWkData[ws.week];
    const wg=wd?fathomGrade(wd.pct):null;
    const started=todayD<0||ws.start<=todayD;
    const col=wg?fgColor(wg):'var(--text3)';
    const bStyle=wg?`background:${col}20;color:${col};border:1px solid ${col}50`:`color:var(--text3);border:1px solid var(--border2)`;
    const wAarHas=!!getWeekAAR(ws.week);
    th.innerHTML=`Week ${ws.week}${started?`<span class="wk-badge" style="${bStyle}">${wg?wg.label+' · '+wd.pct+'%':'—'}</span>`:''}<button id="week-aar-btn-${ws.week}-f" class="aar-btn${wAarHas?' aar-has':''}" onclick="event.stopPropagation();openWeekAAR(${ws.week})" title="Weekly Review" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);margin:0;padding:1px 4px;display:block">✎</button>`;
    rB.appendChild(th);
  });
  thead.appendChild(rB);

  // Row C: day numbers + DOW
  const rC=document.createElement('tr');
  for(let d=1;d<=days;d++){
    const dow=new Date(CY,CM,d).getDay();
    const isToday=d===todayD,isWeekStart=dow===1&&d>1;
    const th=document.createElement('th');
    th.className='st hz-day-th'+(isToday?' today-col':'')+(isWeekStart?' hz-week-sep':'');
    th.innerHTML=`<span class="hd-num">${d}</span><span class="hd-dow">${DOW[dow]}</span>`;
    rC.appendChild(th);
  }
  thead.appendChild(rC);
  t.appendChild(thead);

  const tbody=document.createElement('tbody');
  items.forEach(item=>{
    const tr=document.createElement('tr');
    tr.className='hz-row';
    const nameTd=document.createElement('td');
    nameTd.className='sl hz-habit-td';
    if(editMode){
      const ifreq=item.freq&&item.freq.length<7?item.freq:[0,1,2,3,4,5,6];
      const ifreqBtns=['S','M','T','W','T','F','S'].map((lbl,i)=>`<button class="freq-day-btn${ifreq.includes(i)?' freq-on-fathom':''}" onclick="event.stopPropagation();toggleFathomFreqDay('${item.id}',${i})" title="${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][i]}">${lbl}</button>`).join('');
      nameTd.innerHTML=`<div style="display:flex;flex-direction:column;gap:3px;">
        <div style="display:flex;align-items:center;gap:2px;">
          <span class="dnd-grip" style="margin-right:1px">⠿</span>
          <input class="hbt-in" style="text-align:left;flex:1;min-width:0" value="${esc(item.name)}" onchange="renameFathomItem('${item.id}',this.value)" onclick="event.stopPropagation()" onfocus="expandNameInput(this)" onblur="collapseNameInput(this)"/>
          <span class="sd-pill" onclick="event.stopPropagation();openDatePicker(this)" title="Start date">⊙ ${fmtDate(item.startDate||todayStr())}<input type="date" value="${item.startDate||todayStr()}" onchange="changeFathomStartDate('${item.id}',this.value)"/></span>
          <button class="del-btn" style="display:inline;flex-shrink:0" onclick="deleteFathomItem('${item.id}')" title="Remove">&#10005;</button>
        </div>
        <div style="display:flex;gap:2px;padding-left:16px">${ifreqBtns}</div>
      </div>`;
      tr.draggable=true;
      tr.ondragstart=e=>{_dg={type:'fathom',fid:item.id};tr.classList.add('dnd-drag');e.dataTransfer.effectAllowed='move';e.stopPropagation()};
      tr.ondragend=()=>{tr.classList.remove('dnd-drag');_dg=null};
      tr.ondragover=e=>{
        if(_dg?.type==='fathom'&&_dg.fid!==item.id){
          e.preventDefault();
          const{top,height}=tr.getBoundingClientRect();
          tr.classList.remove('dnd-ins-t','dnd-ins-b');
          tr.classList.add(e.clientY<top+height/2?'dnd-ins-t':'dnd-ins-b');
        }
      };
      tr.ondragleave=()=>{tr.classList.remove('dnd-ins-t','dnd-ins-b')};
      tr.ondrop=e=>{
        e.preventDefault();
        const{top,height}=tr.getBoundingClientRect();
        tr.classList.remove('dnd-ins-t','dnd-ins-b');
        _dropFathomItem(item.id,e.clientY<top+height/2);
      };
    } else {
      nameTd.innerHTML=`<div class="hz-habit-name">${esc(item.name)}</div>`;
    }
    tr.appendChild(nameTd);
    let rowDone=0,rowTotal=0;
    for(let d=1;d<=days;d++){
      const dow=new Date(CY,CM,d).getDay();
      const isToday=d===todayD,isFuture=false,isWeekStart=dow===1&&d>1;
      const chk=isChkFathom(item.id,d);
      const skp=isSkipFathom(item.id,d);
      const foff=item.freq&&item.freq.length<7&&!item.freq.includes(dow);
      if(!isFuture&&!skp&&!foff){rowDone+=chk?1:0;rowTotal++;}
      const td=document.createElement('td');
      td.className='hz-chk-c'+(isToday?' today-col':'')+(isFuture?' future':'')+(isWeekStart?' hz-week-sep':'')+(foff?' freq-off-c':'');
      td.id=`fhzcc-${item.id}-${d}`;
      if(!isFuture&&!foff) td.onclick=()=>doFathomToggle(item.id,d);
      td.innerHTML=`<div class="chk-box${chk?' checked':skp?' skipped':foff?' freq-off':''}" id="fhzcb-${item.id}-${d}" style="background:${chk?FATHOM_COLOR:'transparent'};border-color:${chk?FATHOM_COLOR:'var(--border)'}"></div>`;
      tr.appendChild(td);
    }
    const pct=rowTotal?Math.floor(rowDone/rowTotal*100):0;
    const fg=fathomGrade(pct);
    const doneTd=document.createElement('td');doneTd.className='sr sr-2 hz-sum-td first-sum';doneTd.id=`fhzds-${item.id}`;
    doneTd.innerHTML=`${rowDone}<span style="color:var(--text3);font-size:9px">/${rowTotal}</span>`;
    const pctTd=document.createElement('td');pctTd.className='sr sr-1 hz-sum-td';pctTd.id=`fhzps-${item.id}`;
    pctTd.innerHTML=`<span style="color:${fgColor(fg)};font-weight:600">${pct}%</span><div style="margin-top:3px;height:3px;border-radius:2px;background:var(--border);overflow:hidden"><div style="height:100%;width:${pct}%;background:${fgColor(fg)};border-radius:2px"></div></div>`;
    tr.appendChild(doneTd);tr.appendChild(pctTd);
    tbody.appendChild(tr);
  });
  t.appendChild(tbody);
  scroll.appendChild(t);
  card.appendChild(scroll);
  return card;
}

function doFathomToggle(iid,day){
  toggleFathom(iid,day);
  const chk=isChkFathom(iid,day);
  const skp=isSkipFathom(iid,day);
  const box=document.getElementById(`fhzcb-${iid}-${day}`);
  if(box){
    box.classList.toggle('checked',chk);
    box.classList.toggle('skipped',skp);
    box.style.background=chk?FATHOM_COLOR:'transparent';
    box.style.borderColor=chk?FATHOM_COLOR:'var(--border)';
    box.classList.remove('chk-pop');
    if(chk) requestAnimationFrame(()=>box.classList.add('chk-pop'));
  }
  // Update daily % for this day
  const {pct:dp}=fathomDayProg(day);
  const dpEl=document.getElementById(`fdp-${day}`);
  if(dpEl){const fg=fathomGrade(dp);dpEl.innerHTML=`<span style="color:${fgColor(fg)};font-size:10px;font-weight:700">${dp}%</span>`;}
  // Update item row summary
  const isCurMo=CY===new Date().getFullYear()&&CM===new Date().getMonth();
  const lastD=isCurMo?new Date().getDate():dim(CY,CM);
  let rowDone=0,rowTotal=0;
  for(let d=1;d<=lastD;d++){if(!isSkipFathom(iid,d)){if(isChkFathom(iid,d))rowDone++;rowTotal++;}}
  const pct=rowTotal?Math.floor(rowDone/rowTotal*100):0;
  const fg=fathomGrade(pct);
  const ds=document.getElementById(`fhzds-${iid}`);
  const ps=document.getElementById(`fhzps-${iid}`);
  if(ds) ds.innerHTML=`${rowDone}<span style="color:var(--text3);font-size:9px">/${rowTotal}</span>`;
  if(ps) ps.innerHTML=`<span style="color:${fgColor(fg)};font-weight:600">${pct}%</span><div style="margin-top:3px;height:3px;border-radius:2px;background:var(--border);overflow:hidden"><div style="height:100%;width:${pct}%;background:${fgColor(fg)};border-radius:2px"></div></div>`;
  updStats();
  updTide();
}

function doFathomSkipToggle(iid,day){
  skipToggleFathom(iid,day);
  const chk=isChkFathom(iid,day);
  const skp=isSkipFathom(iid,day);
  const box=document.getElementById(`fhzcb-${iid}-${day}`);
  if(box){
    box.classList.toggle('checked',chk);
    box.classList.toggle('skipped',skp);
    box.style.background=chk?FATHOM_COLOR:'transparent';
    box.style.borderColor=chk?FATHOM_COLOR:'var(--border)';
  }
  const {pct:dp}=fathomDayProg(day);
  const dpEl=document.getElementById(`fdp-${day}`);
  if(dpEl){const fg2=fathomGrade(dp);dpEl.innerHTML=`<span style="color:${fgColor(fg2)};font-size:10px;font-weight:700">${dp}%</span>`;}
  const isCurMo=CY===new Date().getFullYear()&&CM===new Date().getMonth();
  const lastD=isCurMo?new Date().getDate():dim(CY,CM);
  let rowDone=0,rowTotal=0;
  for(let d=1;d<=lastD;d++){if(!isSkipFathom(iid,d)){if(isChkFathom(iid,d))rowDone++;rowTotal++;}}
  const pct=rowTotal?Math.floor(rowDone/rowTotal*100):0;
  const fg=fathomGrade(pct);
  const ds=document.getElementById(`fhzds-${iid}`);
  const ps=document.getElementById(`fhzps-${iid}`);
  if(ds) ds.innerHTML=`${rowDone}<span style="color:var(--text3);font-size:9px">/${rowTotal}</span>`;
  if(ps) ps.innerHTML=`<span style="color:${fgColor(fg)};font-weight:600">${pct}%</span><div style="margin-top:3px;height:3px;border-radius:2px;background:var(--border);overflow:hidden"><div style="height:100%;width:${pct}%;background:${fgColor(fg)};border-radius:2px"></div></div>`;
  updStats();updTide();
}

function addFathomItem(){
  if(!D.fathom) D.fathom={items:[]};
  const item={id:uid(),name:'New Item',startDate:todayStr()};
  D.fathom.items.push(item);
  applyFathomStartDateSkips(item.id,item.startDate);
  save();render();
}
function renameFathomItem(id,name){
  const item=D.fathom?.items?.find(i=>i.id===id);
  if(item){item.name=name.trim()||item.name;save();}
}
function toggleFathomFreqDay(id,dow){
  const item=D.fathom?.items?.find(i=>i.id===id);
  if(item){
    if(!item.freq||item.freq.length>=7) item.freq=[0,1,2,3,4,5,6];
    const idx=item.freq.indexOf(dow);
    if(idx>=0){if(item.freq.length>1)item.freq.splice(idx,1);}
    else{item.freq.push(dow);item.freq.sort((a,b)=>a-b);}
    save();render();
  }
}
function changeFathomStartDate(id,date){
  const item=D.fathom?.items?.find(i=>i.id===id);
  if(item){item.startDate=date||todayStr();applyFathomStartDateSkips(item.id,item.startDate);save();render();}
}
function deleteFathomItem(id){
  if(!confirm('Remove this Fathom item?')) return;
  D.fathom.items=D.fathom.items.filter(i=>i.id!==id);
  save();render();
}

// ─────────────────────────────────────────
//  MULTI-CELL SELECTION
// ─────────────────────────────────────────
function _updSelBar(){
  const bar=document.getElementById('sel-bar');
  const cnt=document.getElementById('sel-count');
  if(!bar) return;
  if(_sel.size>0){bar.style.display='flex';if(cnt)cnt.textContent=`${_sel.size} cell${_sel.size>1?'s':''} selected`;}
  else bar.style.display='none';
}
function _selClear(){
  _sel.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('sel')});
  _sel.clear();_updSelBar();
}
function _parseSel(id){
  const m=id.match(/^(fhzcc|hzcc|cc)-(.+)-(\d+)$/);
  if(!m) return null;
  return {type:m[1]==='fhzcc'?'fathom':'habit',id:m[2],day:+m[3]};
}
function _setHabitState(hid,day,done,skip){
  const mo=md(CY,CM);
  if(!mo.completions[hid])mo.completions[hid]={};
  if(!mo.skips[hid])mo.skips[hid]={};
  mo.completions[hid][day]=done;
  mo.skips[hid][day]=skip;
}
function _setFathomState(iid,day,done,skip){
  const mo=fathomMd();
  if(!mo.fathomCompletions[iid])mo.fathomCompletions[iid]={};
  if(!mo.fathomSkips[iid])mo.fathomSkips[iid]={};
  mo.fathomCompletions[iid][day]=done;
  mo.fathomSkips[iid][day]=skip;
}
function _selAddCell(el){
  if(!el||!el.id||el.classList.contains('future')||!_parseSel(el.id)) return;
  _sel.add(el.id);el.classList.add('sel');
}

// Drag-to-select + long-press-to-skip (capture phase so it runs before onclick)
document.addEventListener('mousedown',e=>{
  const c=e.target.closest('.chk-c:not(.future),.hz-chk-c:not(.future)');
  if(!c||!_parseSel(c.id)) return;
  _selMD=true;_selDrag=false;_selBlock=false;_selAnchor=c.id;
  clearTimeout(_lpTimer);_lpFired=false;
  _lpTimer=setTimeout(()=>{
    if(_selDrag) return;
    _lpFired=true;
    const p=_parseSel(c.id);
    if(!p) return;
    if(p.type==='fathom') doFathomSkipToggle(p.id,p.day);
    else doSkipToggle(p.id,p.day,c.dataset.color||'var(--accent)');
  },500);
},true);

document.addEventListener('mouseover',e=>{
  if(!_selMD) return;
  const c=e.target.closest('.chk-c:not(.future),.hz-chk-c:not(.future)');
  if(!c||!_parseSel(c.id)) return;
  if(!_selDrag){
    _selDrag=true;_selBlock=true;_selClear();_selPath=[];
    clearTimeout(_lpTimer);_lpTimer=null;
    if(_selAnchor){const a=document.getElementById(_selAnchor);if(a){_selAddCell(a);_selPath=[a.id];}}
  }
  const idx=_selPath.indexOf(c.id);
  if(idx!==-1){
    // backtrack: keep this cell, remove everything after it
    const removed=_selPath.splice(idx+1);
    removed.forEach(id=>{_sel.delete(id);const el=document.getElementById(id);if(el)el.classList.remove('sel');});
  } else {
    _selAddCell(c);_selPath.push(c.id);
  }
  _updSelBar();
},true);

document.addEventListener('mouseup',()=>{_selMD=false;clearTimeout(_lpTimer);_lpTimer=null;},true);

document.addEventListener('click',e=>{
  if(_lpFired){_lpFired=false;e.stopPropagation();return;}
  if(_selBlock){_selBlock=false;e.stopPropagation();return;}
  const c=e.target.closest('.chk-c:not(.future),.hz-chk-c:not(.future)');
  if(e.shiftKey&&c&&_parseSel(c.id)){
    e.stopPropagation();
    if(_sel.has(c.id)){_sel.delete(c.id);c.classList.remove('sel');}
    else _selAddCell(c);
    _updSelBar();return;
  }
  if(_sel.size>0) _selClear();
},true);

// Space = cycle all selected cells
document.addEventListener('keydown',e=>{
  if(e.code==='Escape'){_selClear();return;}
  if(e.code!=='Space'||_sel.size===0) return;
  const t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA'||e.target.isContentEditable) return;
  e.preventDefault();
  // Tally states across selection
  let ec=0,dc=0,sc=0;
  _sel.forEach(id=>{
    const p=_parseSel(id);if(!p) return;
    const done=p.type==='fathom'?isChkFathom(p.id,p.day):isChk(p.id,p.day);
    const skip=p.type==='fathom'?isSkipFathom(p.id,p.day):isSkip(p.id,p.day);
    if(done)dc++;else if(skip)sc++;else ec++;
  });
  // Majority state → cycle to next: empty→done, done→skip, skip→empty
  const mx=Math.max(ec,dc,sc);
  let td=false,ts=false;
  if(mx===ec)td=true;
  else if(mx===dc)ts=true;
  // Apply to all selected cells
  _sel.forEach(id=>{
    const p=_parseSel(id);if(!p) return;
    if(p.type==='fathom') _setFathomState(p.id,p.day,td,ts);
    else _setHabitState(p.id,p.day,td,ts);
  });
  save();
  _keepSel=true;
  render();
});

// Prevent browser context menu when long-pressing habit cells
document.addEventListener('contextmenu',e=>{
  if(e.target.closest('.chk-c,.hz-chk-c')) e.preventDefault();
});

// Touch long-press to skip (mobile)
document.addEventListener('touchstart',e=>{
  const c=e.target.closest('.chk-c:not(.future),.hz-chk-c:not(.future)');
  if(!c||!_parseSel(c.id)) return;
  clearTimeout(_lpTimer);_lpFired=false;
  _lpTimer=setTimeout(()=>{
    _lpFired=true;
    const p=_parseSel(c.id);
    if(!p) return;
    if(p.type==='fathom') doFathomSkipToggle(p.id,p.day);
    else doSkipToggle(p.id,p.day,c.dataset.color||'var(--accent)');
  },500);
},{passive:true});
document.addEventListener('touchmove',()=>{clearTimeout(_lpTimer);_lpTimer=null;},{passive:true});
document.addEventListener('touchend',()=>{clearTimeout(_lpTimer);_lpTimer=null;},{passive:true});

// ─────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────
render();
updateSyncBadge();
loadFromCloud().then(()=>render());
</script>
