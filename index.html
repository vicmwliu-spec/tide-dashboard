<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>TIDE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F7F5;
  --surface:#FFFFFF;
  --surface2:#F3F3F0;
  --border:#E4E4E0;
  --border2:#EBEBEA;
  --text1:#111111;
  --text2:#555555;
  --text3:#999999;
  --accent:#2563EB;
  --today-bg:#EFF6FF;
  --today-border:#93C5FD;
  --green:#16A34A;
  --amber:#B45309;
  --red:#DC2626;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 8px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --r:10px;--r2:6px;
  --font:'Inter',system-ui,sans-serif;
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{max-width:1600px;margin:0 auto;padding:20px}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.hdr-l{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.app-logo{font-size:26px;font-weight:800;letter-spacing:.14em;white-space:nowrap;color:var(--text1)}
.month-nav{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:5px 12px;box-shadow:var(--shadow)}
.month-lbl{font-size:14px;font-weight:600;min-width:136px;text-align:center;color:var(--text1)}
.nav-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:2px 7px;border-radius:4px;font-size:17px;line-height:1;transition:background .12s}
.nav-btn:hover{background:var(--border);color:var(--text1)}
.hdr-r{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--r2);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text1);transition:all .12s;white-space:nowrap;font-family:var(--font)}
.btn:hover{background:var(--bg);border-color:var(--text3)}
.btn-pri{background:var(--text1);color:#fff;border-color:var(--text1)}
.btn-pri:hover{background:#333;border-color:#333}
.btn-on{background:#EEF2FF;color:#4338CA;border-color:#C7D2FE}
.btn-today{background:var(--today-bg);color:var(--accent);border-color:var(--today-border)}

/* ── Quote ── */
.quote-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 18px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow)}
.quote-icon{color:var(--text3);font-size:22px;line-height:1;margin-top:1px;flex-shrink:0}
.quote-ta{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:13px;color:var(--text2);resize:none;line-height:1.6;overflow:hidden}
.quote-ta::placeholder{color:var(--text3)}
/* ── Priority ── */
.priority-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 18px;margin-bottom:0;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow);min-height:80px}
.priority-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);white-space:nowrap;margin-top:3px;flex-shrink:0}
.priority-ta{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text1);resize:none;line-height:1.6;overflow:hidden;word-break:break-word;min-height:1.4em}
.priority-ta[contenteditable=true]:empty::before{content:attr(data-placeholder);color:var(--text3);pointer-events:none}
/* ── Top row ── */
.top-row{display:flex;gap:14px;margin-bottom:14px;align-items:stretch}
.top-row .quote-card{flex:1;margin-bottom:0}
.top-left-col{width:35%;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.top-row .priority-card{width:35%;flex-shrink:0}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.stat-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.stat-val{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ── Chart ── */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
.chart-wrap{position:relative;height:230px;overflow:hidden}

/* ── Grid ── */
.grid-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
.grid-bar{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);gap:10px}
.grid-bar-l{font-size:12px;font-weight:600;color:var(--text2)}
.grid-scroll{overflow-x:auto}
.grid-scroll::-webkit-scrollbar{height:5px}
.grid-scroll::-webkit-scrollbar-track{background:transparent}
.grid-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.tbl{border-collapse:separate;border-spacing:0;width:100%;min-width:max-content}
.tbl th,.tbl td{border-bottom:1px solid var(--border2);border-right:1px solid var(--border2)}
.tbl th:last-child,.tbl td:last-child{border-right:none}

/* Sticky */
.sl{position:sticky;left:0;z-index:2;background:var(--surface)}
.sr{position:sticky;z-index:2;background:var(--surface)}
.sr-1{right:0}
.sr-2{right:56px}
.st{position:sticky;top:0;z-index:3;background:var(--surface)}
.sl.st{z-index:4}
.sr.st{z-index:4}

/* Group row */
.grp-row th{height:30px;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;border-bottom:2px solid var(--border)}
.grp-th{text-align:center;padding:0 8px;border-left:2px solid var(--border);border-right:2px solid var(--border) !important}
.grp-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
#tb-name::placeholder{color:var(--text3);opacity:.55}
.grp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;outline:1.5px solid transparent}
.grp-dot.lum-light{outline-color:rgba(0,0,0,0.18)}
.grp-dot.lum-dark{outline-color:rgba(255,255,255,0.25)}
.grp-name-in{background:none;border:none;outline:none;font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;cursor:default;min-width:50px;max-width:100px;text-align:center}

/* Habit name row */
.hbt-row th{padding:7px 8px;font-size:11px;font-weight:500;color:var(--text2);white-space:nowrap;border-bottom:2px solid var(--border);text-align:center;min-width:72px}
.hbt-row .day-hdr{text-align:left;padding-left:14px;min-width:76px;border-right:2px solid var(--border) !important}
.hbt-row .sum-hdr{min-width:56px;text-align:center;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3)}
.hbt-row .sum-hdr.first-sum{border-left:2px solid var(--border)}
.hbt-in{background:none;border:none;outline:none;font-family:var(--font);font-size:11px;font-weight:500;color:var(--text2);text-align:center;cursor:default;width:100%;padding:0}

/* Day rows */
.day-r{transition:background .08s}
.day-r:hover{background:var(--surface2)}
.day-r:hover .sl,.day-r:hover .sr{background:var(--surface2)}
.today-r{background:var(--today-bg)}
.today-r .sl,.today-r .sr{background:var(--today-bg)}
.day-c{padding:5px 14px;border-right:2px solid var(--border) !important;white-space:nowrap}
.day-num{font-size:12px;font-weight:600;line-height:1.2}
.day-dow{font-size:10px;color:var(--text3);font-weight:500}
.today-r .day-num{color:var(--accent)}
.today-badge{display:inline-block;background:var(--accent);color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;letter-spacing:.05em;vertical-align:middle;margin-left:4px;text-transform:uppercase}

/* Check cells */
.chk-c{text-align:center;padding:3px 5px;cursor:pointer;user-select:none}
.chk-c:hover{background:var(--border2)}
.chk-c.future{opacity:.35;cursor:default;pointer-events:none}
.chk-box{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;transition:all .13s;will-change:transform}
@keyframes pop{0%{transform:scale(.75)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.chk-pop{animation:pop .18s ease}

/* Summary cells */
.sum-c{text-align:center;padding:4px 8px;font-size:11px;font-weight:500;color:var(--text2)}
.sum-c.first-sum{border-left:2px solid var(--border) !important}

/* Analysis footer */
.ana-sep{border-top:2px solid var(--border)}
.ana-r td{padding:5px 8px;font-size:11px;text-align:center;color:var(--text2);border-bottom:1px solid var(--border2)}
.ana-lbl{text-align:left !important;padding-left:14px !important;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);white-space:nowrap;border-right:2px solid var(--border) !important}
.pill{display:inline-flex;align-items:center;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700}
.goal-in{background:none;border:none;outline:none;font-family:var(--font);font-size:11px;color:var(--text2);text-align:center;width:40px;cursor:default}

/* Group separator on cells */
.grp-sep{border-left:2px solid var(--border) !important}

/* ── AAR ── */
.aar-btn{display:block;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;padding:2px 5px;border-radius:3px;line-height:1.4;margin-top:3px;font-family:var(--font);letter-spacing:.03em;white-space:nowrap}
.aar-btn:hover{background:var(--border2);color:var(--text1)}
.aar-btn.aar-has{color:var(--accent);font-weight:600}
#aar-editor hr,.quote-ta hr,.priority-ta hr,.intention-ta hr{border:none;border-top:2px solid var(--border);margin:14px 0;display:block}
#aar-editor ul,#aar-editor ol,.quote-ta ul,.quote-ta ol,.priority-ta ul,.priority-ta ol,.intention-ta ul,.intention-ta ol{padding-left:22px;margin:4px 0}
#aar-editor li,.quote-ta li,.priority-ta li,.intention-ta li{margin:2px 0}
#aar-editor ul,.quote-ta ul,.priority-ta ul,.intention-ta ul{list-style-type:disc}
#aar-editor ul ul,.quote-ta ul ul,.priority-ta ul ul,.intention-ta ul ul{list-style-type:circle}
#aar-editor ul ul ul,.quote-ta ul ul ul,.priority-ta ul ul ul,.intention-ta ul ul ul{list-style-type:square}
#aar-editor ol,.quote-ta ol,.priority-ta ol,.intention-ta ol{list-style-type:decimal}
#aar-editor ol ol,.quote-ta ol ol,.priority-ta ol ol,.intention-ta ol ol{list-style-type:lower-alpha}
#aar-editor ol ol ol,.quote-ta ol ol ol,.priority-ta ol ol ol,.intention-ta ol ol ol{list-style-type:lower-roman}
/* Richtext contenteditable */
.quote-ta{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:13px;color:var(--text2);line-height:1.6;word-break:break-word;min-height:1.4em}
.quote-ta[contenteditable=true]:empty::before{content:attr(data-placeholder);color:var(--text3);pointer-events:none}

/* ── Annual ── */
.annual-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
.mo-card{border:1px solid var(--border);border-radius:var(--r2);padding:13px 15px;cursor:pointer;transition:all .12s;background:var(--surface)}
.mo-card:hover{border-color:var(--text3);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.mo-card.cur{border-color:var(--accent);background:var(--today-bg)}
.mo-name{font-size:13px;font-weight:600;margin-bottom:8px}
.mo-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:5px}
.mo-fill{height:100%;border-radius:2px}
.mo-stat{font-size:10px;color:var(--text3)}

/* ── Edit controls ── */
.del-btn{display:none;background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 2px;line-height:1;vertical-align:middle}
.edit-mode .del-btn{display:inline}
.del-btn:hover{color:#EF4444}
.clr-btn{display:none;background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:0 2px;line-height:1;opacity:.55;flex-shrink:0;}
.edit-mode .clr-btn{display:inline}
.clr-btn:hover{color:#EF4444;opacity:1;}
.arch-panel{margin:8px 12px 4px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r2);}
.arch-panel-title{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.arch-item{display:flex;align-items:center;gap:6px;padding:4px 2px;border-bottom:1px solid var(--border2);}
.arch-item:last-child{border-bottom:none;}
.arch-item-name{flex:1;color:var(--text3);text-decoration:line-through;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.arch-item-grp{font-size:10px;color:var(--text3);flex-shrink:0;}
.restore-btn{font-size:9px;padding:1px 6px;border-radius:3px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:var(--font);}
.restore-btn:hover{background:var(--border);}
.purge-btn{font-size:9px;padding:1px 6px;border-radius:3px;border:1px solid #FCA5A5;background:transparent;color:#EF4444;cursor:pointer;white-space:nowrap;font-family:var(--font);}
.purge-btn:hover{background:#FEF2F2;}
.add-hbt-btn{display:none;background:none;border:1px dashed var(--border);border-radius:var(--r2);padding:3px 9px;font-size:10px;color:var(--text3);cursor:pointer;font-family:var(--font);white-space:nowrap}
.edit-mode .add-hbt-btn{display:inline-flex;align-items:center;gap:3px}
.add-hbt-btn:hover{border-color:var(--text2);color:var(--text2)}
.color-dot-btn{display:none;width:12px;height:12px;border-radius:50%;border:2px solid rgba(0,0,0,.12);cursor:pointer;padding:0;flex-shrink:0}
.edit-mode .color-dot-btn{display:block}
.grade-tip{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:7px 10px;box-shadow:var(--shadow-md);z-index:1000;font-size:11px;pointer-events:none;white-space:nowrap}
.color-popup{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:8px;box-shadow:var(--shadow-md);z-index:1000;display:flex;flex-wrap:wrap;gap:5px;width:112px}
.csw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.csw:hover{border-color:var(--text1)}

/* ── Edit mode input states ── */
.edit-mode .grp-name-in,.edit-mode .hbt-in,.edit-mode .goal-in{cursor:text;border-radius:3px}
.edit-mode .grp-name-in:focus,.edit-mode .hbt-in:focus,.edit-mode .goal-in:focus{background:#FFFBEB;outline:1px solid #FDE68A}

/* ── Start date pill ── */
.sd-pill{position:relative;display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:10px;font-weight:500;color:var(--text3);cursor:pointer;white-space:nowrap;font-family:var(--font);user-select:none;transition:border-color .12s,color .12s,background .12s;flex-shrink:0}
.sd-pill:hover{border-color:var(--accent);color:var(--accent);background:var(--today-bg)}
.sd-pill input[type="date"]{position:absolute;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;border:none;padding:0;margin:0}

/* ── Horizontal layout ── */
.hz-day-th{text-align:center;padding:4px 2px;font-size:10px;font-weight:600;color:var(--text2);white-space:nowrap;vertical-align:bottom}
.hz-day-th .hd-num{font-size:12px;font-weight:700;display:block;line-height:1.2}
.hz-day-th .hd-dow{font-size:9px;color:var(--text3);font-weight:500;display:block}
.hz-day-th.today-col{background:var(--today-bg)}
.hz-day-th.today-col .hd-num{color:var(--accent)}
.hz-habit-td{text-align:left;padding:5px 8px 5px 10px;border-right:2px solid var(--border) !important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--surface)}
.hz-habit-name{font-size:11px;font-weight:500;color:var(--text2);line-height:1.2}
.hz-habit-grp{font-size:10px;color:var(--text3)}
.hz-chk-c{text-align:center;padding:3px 2px;cursor:pointer;user-select:none}
.hz-chk-c:hover{background:var(--border2)}
.hz-chk-c.today-col{background:var(--today-bg)}
.hz-chk-c.today-col:hover{background:#DBEAFE}
.hz-chk-c.future{opacity:.3;cursor:default;pointer-events:none}
.hz-row{transition:background .08s}
.hz-row:hover .hz-habit-td{background:var(--surface2)}
.hz-grp-row{height:30px;padding:0 14px;background:var(--surface2) !important;border-top:2px solid var(--border) !important;border-bottom:2px solid var(--border) !important}
.hz-chart-corner{text-align:left;padding:8px 14px;vertical-align:bottom;border-right:2px solid var(--border) !important;background:var(--surface)}
.hz-chart-corner-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.hz-chart-td{padding:0;vertical-align:bottom;border-bottom:2px solid var(--border) !important}
.hz-sum-th{width:56px;min-width:56px;text-align:center;padding:4px 6px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);border-bottom:2px solid var(--border)}
.hz-sum-td{width:56px;min-width:56px;text-align:center;padding:4px 6px;font-size:11px;font-weight:500;color:var(--text2)}
.hz-sum-td.first-sum{border-left:2px solid var(--border) !important}
.hz-sum-th.first-sum{border-left:2px solid var(--border) !important}
.hz-week-sep{border-left:1px dashed var(--border) !important}

/* ── Week labels (shared style) ── */
.week-lbl-text{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
/* Vertical: separator rows in tbody */
.week-sep-r td{background:var(--surface2) !important;border-top:1px solid var(--border) !important;border-bottom:1px solid var(--border2) !important}
.week-sep-r .sl{background:var(--surface2) !important}
.week-sep-day{padding:3px 14px;white-space:nowrap;cursor:default}
.wk-badge{display:inline-flex;align-items:center;margin-left:8px;font-size:9px;font-weight:700;letter-spacing:.05em;padding:1px 6px;border-radius:9px;vertical-align:middle;opacity:0;transition:opacity .15s,transform .15s;transform:translateX(-4px);pointer-events:none;user-select:none}
.week-sep-r:hover .wk-badge,.hz-week-hdr-th:hover .wk-badge{opacity:1;transform:translateX(0)}
/* Horizontal: week header row in thead */
.hz-week-hdr-th{text-align:center;padding:3px 4px;background:var(--surface2);border-bottom:1px solid var(--border2);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);white-space:nowrap}
.hz-week-hdr-th.first-week{border-left:none}
.hz-week-hdr-th.week-start-sep{border-left:1px solid var(--border)}

/* ── Horizontal: no-scroll fixed layout ── */
#hz-tbl{width:100%;min-width:unset;table-layout:fixed}
/* ── Grid fade-in on render ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.grid-card{animation:fadeIn .18s ease}

/* ── Drag & Drop ── */
.dnd-drag{opacity:.2;cursor:grabbing !important}
.dnd-grip{color:var(--border);cursor:grab;font-size:13px;line-height:1;padding:0 1px;flex-shrink:0;user-select:none;transition:color .1s}
.dnd-grip:hover{color:var(--text3)}
.dnd-ins-l{box-shadow:inset 3px 0 0 var(--accent) !important}
.dnd-ins-r{box-shadow:inset -3px 0 0 var(--accent) !important}
tr.dnd-ins-t>td,tr.dnd-ins-t>th{box-shadow:inset 0 3px 0 var(--accent) !important}

<div id="sel-bar"><span id="sel-count"></span><span class="sel-hint">Space to cycle &nbsp;·&nbsp; Esc to clear</span></div>

<script>
// ─────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────
const SK = 'habit_dash_v1';
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const PAL = ['#3B82F6','#8B5CF6','#10B981','#F59E0B','#EC4899','#14B8A6','#FACC15','#6366F1','#EF4444','#06B6D4'];
// Returns a readable version of a color — darkens very light colors in light mode for text/dots
function _colorLum(hex){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000;}catch{return 128;}}
function _colorSat(hex){try{const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);if(mx===mn)return 0;const l=(mx+mn)/2;return(mx-mn)/(l>0.5?2-mx-mn:mx+mn);}catch{return 0;}}
function _isLightColor(hex){return!darkMode&&_colorLum(hex)>220&&_colorSat(hex)<0.25;}
function _isDarkColor(hex){return darkMode&&_colorLum(hex)<25&&_colorSat(hex)<0.25;}
function _readableColor(hex){if(_isLightColor(hex))return'rgba(0,0,0,0.5)';if(_isDarkColor(hex))return'rgba(255,255,255,0.6)';return hex;}
function _lighten(hex,amt){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`#${Math.min(255,Math.round(r+(255-r)*amt)).toString(16).padStart(2,'0')}${Math.min(255,Math.round(g+(255-g)*amt)).toString(16).padStart(2,'0')}${Math.min(255,Math.round(b+(255-b)*amt)).toString(16).padStart(2,'0')}`;}catch{return hex;}}
function _darken(hex,amt){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`#${Math.round(r*(1-amt)).toString(16).padStart(2,'0')}${Math.round(g*(1-amt)).toString(16).padStart(2,'0')}${Math.round(b*(1-amt)).toString(16).padStart(2,'0')}`;}catch{return hex;}}

function uid(){ return '_'+Math.random().toString(36).slice(2,9) }
function todayStr(){ return new Date().toISOString().slice(0,10) }

function defaultData(){
  const g1=uid(),g2=uid();
  return {
    groups:[
      {id:g1,name:'Morning',color:'#3B82F6',habits:[
        {id:uid(),name:'Exercise',goalDays:31},
        {id:uid(),name:'Meditate',goalDays:31},
        {id:uid(),name:'Cold Shower',goalDays:31},
      ]},
      {id:g2,name:'Evening',color:'#8B5CF6',habits:[
        {id:uid(),name:'Read 30 min',goalDays:31},
        {id:uid(),name:'Journal',goalDays:31},
      ]},
    ],
    months:{},
    aarTemplates:[],
    fathom:{items:[]},
    priority:'',
  };
}

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let D = (()=>{ try{ const d=JSON.parse(localStorage.getItem(SK))||defaultData();if(!d.aarTemplates)d.aarTemplates=[];if(!d.fathom)d.fathom={items:[]};if(!d.timeBlocks)d.timeBlocks=[];return d }catch{ return defaultData() } })();
let darkMode = localStorage.getItem('tide_dark')==='1';
if(darkMode) document.documentElement.classList.add('dark');
const now = new Date();
let CY = now.getFullYear();
let CM = now.getMonth();
let editMode = false;
let view = 'month'; // 'month'|'year'
let gridLayout = 'horizontal'; // 'vertical'|'horizontal'
let chartInst = null;
let hzChartInst = null;
let chartSoloState = null;
let colorPopTarget = null; // {groupId, x, y}
let _dg = null; // drag state: {type:'group'|'habit'|'template', gid?, hid?, tid?}
let _aarDay = null; // currently open AAR day
let _aarWeek = null; // currently open weekly AAR week number
let _sel = new Set();        // selected cell IDs
let _selMD = false;          // mousedown held on a cell
let _selDrag = false;        // drag selection active
let _selBlock = false;       // suppress next click (was a drag)
let _keepSel = false;        // preserve selection across next render()
let _selAnchor = null;       // first cell of current drag
let _selPath = [];           // ordered cells added this drag (for backtrack-deselect)
let _lpTimer = null;         // long-press timer
let _lpFired = false;        // long press triggered (suppress next click)

// ─────────────────────────────────────────
//  CLOUD SYNC (Supabase)
// ─────────────────────────────────────────
const SB_URL = 'https://kluxonxyygddfbliognh.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsdXhvbnh5eWdkZGZibGlvZ25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzk0MDksImV4cCI6MjA5NDY1NTQwOX0.2spUovftRZPDwhe-HJjeWq6-QNvhfiGm3OfBivHTHIQ';
const _sb = supabase.createClient(SB_URL, SB_KEY);

let _syncStatus = 'loading'; // 'loading'|'synced'|'syncing'|'offline'
let _syncTimer = null;

function updateSyncBadge(){
  const el = document.getElementById('sync-badge');
  if(!el) return;
  const cfg = {
    loading: {dot:'#F59E0B', text:'Syncing...'},
    syncing: {dot:'#F59E0B', text:'Syncing...'},
    synced:  {dot:'#16A34A', text:'Synced'},
    offline: {dot:'#EF4444', text:'Offline'},
  }[_syncStatus] || {dot:'#999', text:'...'};
  el.innerHTML=`<span style="width:6px;height:6px;border-radius:50%;background:${cfg.dot};display:inline-block;flex-shrink:0"></span><span>${cfg.text}</span>`;
}

async function _pushToCloud(){
  _syncStatus='syncing';
  updateSyncBadge();
  try{
    const {error}=await _sb.from('tide_data').upsert({id:'main',data:D,updated_at:new Date().toISOString()});
    if(error) throw error;
    _syncStatus='synced';
  }catch(e){
    console.warn('Sync failed:',e);
    _syncStatus='offline';
  }
  updateSyncBadge();
}

async function loadFromCloud(){
  try{
    const {data,error}=await _sb.from('tide_data').select('data,updated_at').eq('id','main').single();
    if(error) throw error;
    const cloudHasData=data?.data && Object.keys(data.data).length>0 && data.data.groups;
    if(cloudHasData){
      D=data.data;
      if(!D.aarTemplates) D.aarTemplates=[];
      localStorage.setItem(SK,JSON.stringify(D));
      _syncStatus='synced';
    } else {
      // Cloud is empty — upload our local data so other devices can get it
      await _pushToCloud();
    }
  }catch(e){
    console.warn('Cloud load failed, using local data:',e);
    _syncStatus='offline';
  }
  updateSyncBadge();
}

function save(){
  localStorage.setItem(SK,JSON.stringify(D));
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(_pushToCloud,1500);
}

function toggleDark(){
  darkMode=!darkMode;
  localStorage.setItem('tide_dark',darkMode?'1':'0');
  document.documentElement.classList.toggle('dark',darkMode);
  render();
}


function pillBg(pct){
  if(darkMode) return pct>=80?'rgba(34,197,94,.15)':pct>=50?'rgba(217,119,6,.15)':'rgba(239,68,68,.15)';
  return pct>=80?'#F0FFF4':pct>=50?'#FFFBEB':'#FFF1F2';
}

function chartConf(){
  const d=darkMode;
  return {
    ref:    d?'rgba(255,255,255,.10)':'#E4E4E0',
    overall:d?'#EDEDEE':'#18181B',
    fill:   d?'rgba(237,237,238,.07)':'rgba(24,24,27,.05)',
    grid:   d?'#232328':'#F3F3F0',
    ticks:  d?'#5C5C70':'#BBBBBB',
    legend: d?'#5C5C70':'#999999',
    tipBg:  d?'#1A1A1E':'#111111',
    tipBdr: d?'#2E2E33':'#333333',
    tipBdy: d?'#8E8EA0':'#AAAAAA',
    cumul:  d?'rgba(168,162,158,0.5)':'rgba(120,113,108,0.5)',
  };
}

function gradeColor(){
  const pct=tideOverallScore();
  const grade=TIDE_GRADES.find(g=>pct>=g.min)||TIDE_GRADES[TIDE_GRADES.length-1];
  const map={
    'var(--red)':'#EF4444',
  };
  return map[grade.color]||grade.color;
}

function chartFillGradient(ctx,chartArea){
  const color=gradeColor();
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  const grad=ctx.createLinearGradient(0,chartArea.top,0,chartArea.bottom);
  grad.addColorStop(0,`rgba(${r},${g},${b},.35)`);
  grad.addColorStop(1,`rgba(${r},${g},${b},.03)`);
  return grad;
}

function todayStats(){
  const t=new Date();
  const yr=t.getFullYear(),mo=t.getMonth(),day=t.getDate();
  const dow=t.getDay();
  const mkey=mk(yr,mo);
  const mdata=D.months[mkey];
  const todayGroups=(mdata&&mdata.snapshot)?mdata.snapshot.groups:D.groups;
  const h=todayGroups.flatMap(g=>g.habits.filter(hb=>{
    if(hb.archived) return false;
    if(hb.freq&&hb.freq.length<7&&!hb.freq.includes(dow)) return false;
    if(hb.startDate&&new Date(hb.startDate+'T00:00:00')>t) return false;
    return true;
  }).map(hb=>({...hb})));
  let done=0,total=0;
  h.forEach(hb=>{if(!(mdata?.skips?.[hb.id]?.[day])){total++;if(mdata?.completions[hb.id]?.[day])done++;}});
  const pct=total?Math.floor(done/total*100):0;
  const groups=todayGroups.map(g=>{
    let gDone=0,gTotal=0;
    g.habits.filter(hb=>!hb.archived).forEach(hb=>{
      if(hb.freq&&hb.freq.length<7&&!hb.freq.includes(dow)) return;
      if(!(mdata?.skips?.[hb.id]?.[day])){gTotal++;if(mdata?.completions[hb.id]?.[day])gDone++;}
    });
    return {id:g.id,name:g.name,color:g.color,done:gDone,total:gTotal,pct:gTotal?Math.floor(gDone/gTotal*100):0};
  });
  return {done,total,pct,groups};
}

// ─────────────────────────────────────────
//  DATA HELPERS
// ─────────────────────────────────────────
function mk(y,m){ return `${y}-${String(m+1).padStart(2,'0')}` }

function md(y,m){
  const k=mk(y,m);
  if(!D.months[k]) D.months[k]={quote:'',notes:'',completions:{},skips:{}};
  if(!D.months[k].skips) D.months[k].skips={};
  return D.months[k];
}

function dim(y,m){ return new Date(y,m+1,0).getDate() }
function fdow(y,m){ return new Date(y,m,1).getDay() }

// Returns [{week:N, start:d, end:d}, ...] for the current month
function getWeekSpans(y,m){
  const days=dim(y,m);
  const fd=(new Date(y,m,1).getDay()+6)%7; // 0=Mon
  const spans=[];
  let curWeek=0,wStart=1;
  for(let d=1;d<=days;d++){
    const wn=Math.ceil((d+fd)/7);
    if(wn!==curWeek){
      if(curWeek>0) spans.push({week:curWeek,start:wStart,end:d-1});
      curWeek=wn; wStart=d;
    }
  }
  spans.push({week:curWeek,start:wStart,end:days});
  return spans;
}

function allHabits(){ return D.groups.flatMap(g=>g.habits.map(h=>({...h,gid:g.id,gc:g.color,gn:g.name}))) }

function activeGroups(){
  const m=D.months[mk(CY,CM)];
  return (m&&m.snapshot)?m.snapshot.groups:D.groups;
}
function activeFathomItems(){
  const m=D.months[mk(CY,CM)];
  return (m&&m.snapshot)?m.snapshot.fathomItems:(D.fathom?.items||[]);
}
function isMonthArchived(){
  const m=D.months[mk(CY,CM)];
  return !!(m&&m.archived);
}
function hasMonthSnapshot(){
  const m=D.months[mk(CY,CM)];
  return !!(m&&m.snapshot);
}

function isChk(hid,day){
  const mo=D.months[mk(CY,CM)];
  if(!mo) return false;
  return !!(mo.completions[hid]&&mo.completions[hid][day]);
}
function isSkip(hid,day){
  const mo=D.months[mk(CY,CM)];
  return !!(mo?.skips?.[hid]?.[day]);
}
function isFreqExcluded(hid,day){
  for(const g of activeGroups()){const h=g.habits.find(h=>h.id===hid);if(h){if(!h.freq||h.freq.length>=7)return false;return!h.freq.includes(new Date(CY,CM,day).getDay());}}
  return false;
}

function toggle(hid,day){
  let startMoved=false;
  for(const g of activeGroups()){
    const h=g.habits.find(h=>h.id===hid);
    if(h&&h.startDate){
      const cellDate=new Date(CY,CM,day);
      if(cellDate<new Date(h.startDate+'T00:00:00')){
        const newStart=`${CY}-${String(CM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        if(!confirm(`"${h.name}" starts on ${fmtDate(h.startDate)}. Move the start date back to ${fmtDate(newStart)} to log this day?`))return;
        h.startDate=newStart;
        applyHabitStartDateSkips(hid,h.startDate);
        startMoved=true;
      }
    }
    break;
  }
  const mo=md(CY,CM);
  if(!mo.completions[hid]) mo.completions[hid]={};
  if(!mo.skips[hid]) mo.skips[hid]={};
  mo.skips[hid][day]=false;
  mo.completions[hid][day]=!mo.completions[hid][day];
  save();
  if(startMoved) render(); else partialUpdate(hid,day);
}
function skipToggle(hid,day){
  const mo=md(CY,CM);
  if(!mo.completions[hid]) mo.completions[hid]={};
  if(!mo.skips[hid]) mo.skips[hid]={};
  const skip=!!mo.skips[hid][day];
  mo.completions[hid][day]=false;
  mo.skips[hid][day]=!skip;
  save();
}

function dayProg(day){
  const cellDate=new Date(CY,CM,day);
  const dow=cellDate.getDay();
  const h=activeGroups().flatMap(g=>g.habits.map(hb=>({...hb,gid:g.id}))).filter(hb=>{
    if(hb.archived) return false;
    if(hb.startDate&&new Date(hb.startDate+'T00:00:00')>cellDate) return false;
    if(hb.freq&&hb.freq.length<7&&!hb.freq.includes(dow)) return false;
    return true;
  });
  let done=0,total=0;
  h.forEach(hb=>{if(!isSkip(hb.id,day)){total++;if(isChk(hb.id,day))done++;}});
  return {done,total,pct:total?Math.floor(done/total*100):0};
}

function habitProg(hid){
  const days=dim(CY,CM);
  let isArch=false;
  for(const g of activeGroups()){const h=g.habits.find(h=>h.id===hid);if(h){isArch=!!h.archived;break;}}
  if(isArch) return {goal:days,actual:0,pct:0,last:0};
  const today=new Date();
  const isCur=today.getFullYear()===CY&&today.getMonth()===CM;
  const last=isCur?today.getDate():days;
  let done=0,possible=0;
  for(let d=1;d<=last;d++){if(isFreqExcluded(hid,d))continue;if(!isSkip(hid,d)){possible++;if(isChk(hid,d))done++;}}
  return {goal:days,actual:done,pct:possible?Math.round(done/possible*100):0,last:possible};
}

function monthStats(){
  const habits=activeGroups().flatMap(g=>g.habits.filter(hb=>!hb.archived));
  const days=dim(CY,CM);
  const today=new Date();
  const isCur=today.getFullYear()===CY&&today.getMonth()===CM;
  const td=isCur?today.getDate():days;
  const dLeft=isCur?days-td:0;
  let comp=0,poss=0;
  for(let d=1;d<=td;d++){const p=dayProg(d);comp+=p.done;poss+=p.total;}
  const rate=poss?Math.floor(comp/poss*100):0;
  const futPoss=habits.length*dLeft;
  const maxRate=(poss+futPoss)?Math.floor((comp+futPoss)/(poss+futPoss)*100):0;
  const monthGroups=activeGroups().map(g=>{
    const hs=g.habits.filter(hb=>!hb.archived);
    let gd=0,gt=0;
    for(let d=1;d<=td;d++){const dow=new Date(CY,CM,d).getDay();hs.forEach(hb=>{if(hb.freq&&hb.freq.length<7&&!hb.freq.includes(dow))return;if(!isSkip(hb.id,d)){const chk=isChk(hb.id,d);gt++;if(chk)gd++;}});}
    const gFutPoss=hs.length*dLeft;
    const maxRate=(gt+gFutPoss)?Math.floor((gd+gFutPoss)/(gt+gFutPoss)*100):0;
    return {...g,pct:gt?Math.floor(gd/gt*100):0,gt,gd,maxRate};
  });
  return {comp,poss,rate,dLeft,td,isCur,maxRate,monthGroups,futPoss};
}

function allTimeTotal(){
  let t=0;
  Object.values(D.months).forEach(m=>{
    Object.values(m.completions).forEach(hc=>{
      Object.values(hc).forEach(v=>{if(v)t++});
    });
  });
  return t;
}


function cumulData(){
  const days=dim(CY,CM);
  const h=activeGroups().flatMap(g=>g.habits.map(hb=>({...hb,gid:g.id})));
  if(!h.length) return {overall:[],groups:[]};
  const overall=[];
  for(let d=1;d<=days;d++){
    const p=dayProg(d);
    overall.push({x:d,y:p.pct});
  }
  const groups=activeGroups().map(g=>{
    const pts=[];
    for(let d=1;d<=days;d++){
      let done=0,tot=0;
      g.habits.forEach(hb=>{if(!isSkip(hb.id,d)){tot++;if(isChk(hb.id,d))done++;}});
      pts.push({x:d,y:tot?Math.floor(done/tot*100):0});
    }
    return {id:g.id,name:g.name,color:g.color,data:pts};
  });
  return {overall,groups};
}
function firstActiveDay(){
  const days=dim(CY,CM);
  for(let d=1;d<=days;d++){if(dayProg(d).total>0)return d;}
  return 1;
}
function cumulProgressData(){
  const days=dim(CY,CM);
  const now=new Date();
  const todayD=(CY===now.getFullYear()&&CM===now.getMonth()+1)?now.getDate():days;
  let monthTotal=0;
  for(let d=1;d<=days;d++) monthTotal+=dayProg(d).total;
  if(!monthTotal) return [];
  const pts=[];let done=0;
  for(let d=1;d<=days;d++){
    if(d<=todayD){const p=dayProg(d);done+=p.done;pts.push({x:d,y:Math.round(done/monthTotal*100)});}
  }
  return pts;
}

const TB_COLORS=['#3B82F6','#8B5CF6','#10B981','#F59E0B','#EC4899','#14B8A6','#FACC15','#6366F1','#EF4444','#06B6D4'];
const TB_RO=96,TB_RI=72,TB_RM=84;
function _tbUuid(){return Math.random().toString(36).slice(2,10);}
function _tbAngle(min){return (min/1440)*360-90;}
function _tbPt(r,deg){const rad=deg*Math.PI/180;return [110+r*Math.cos(rad),110+r*Math.sin(rad)];}
function _tbArcPath(r1,r2,a1,a2){
  const span=((a2-a1)+360)%360;const lg=span>180?1:0;
  const [ox1,oy1]=_tbPt(r2,a1);const [ox2,oy2]=_tbPt(r2,a2);
  const [ix1,iy1]=_tbPt(r1,a2);const [ix2,iy2]=_tbPt(r1,a1);
  return `M${ox1.toFixed(2)},${oy1.toFixed(2)} A${r2},${r2},0,${lg},1,${ox2.toFixed(2)},${oy2.toFixed(2)} L${ix1.toFixed(2)},${iy1.toFixed(2)} A${r1},${r1},0,${lg},0,${ix2.toFixed(2)},${iy2.toFixed(2)}Z`;
}
function _tbMouseMin(e){
  const svg=document.getElementById('tb-svg');if(!svg)return 0;
  const r=svg.getBoundingClientRect();
  // SVG viewBox 220x220, center at 110,110 — map to rendered size
  const scaleX=r.width/220,scaleY=r.height/220;
  const dx=e.clientX-(r.left+110*scaleX),dy=e.clientY-(r.top+110*scaleY);
  const angle=(Math.atan2(dy,dx)*180/Math.PI+90+360)%360;
  return Math.round(angle/360*1440/15)*15;
}
let _tbDrag=null;
function _tbMouseDown(e){
  e.preventDefault();e.stopPropagation();
  const id=e.currentTarget.dataset.tbid;
  const block=(D.timeBlocks||[]).find(b=>b.id===id);
  if(!block)return;
  const curMin=_tbMouseMin(e);
  const ds=((curMin-block.startMin)+1440)%1440,de=((curMin-block.endMin)+1440)%1440;
  const mode=ds<20?'start':de<20||de>1420?'end':'move';
  _tbDrag={id,orig:{...block},origMin:curMin,mode,sx:e.clientX,sy:e.clientY,moved:false};
  const _t=document.getElementById('tb-tip');if(_t)_t.style.display='none';
  document.addEventListener('mousemove',_tbMouseMove);
  document.addEventListener('mouseup',_tbMouseUp,{once:true});
}
function _tbMouseMove(e){
  if(!_tbDrag)return;
  const dx=e.clientX-_tbDrag.sx,dy=e.clientY-_tbDrag.sy;
  if(!_tbDrag.moved&&Math.sqrt(dx*dx+dy*dy)<12)return;
  _tbDrag.moved=true;
  document.body.style.cursor='grabbing';
  const curMin=_tbMouseMin(e);
  let delta=curMin-_tbDrag.origMin;
  if(delta>720)delta-=1440;if(delta<-720)delta+=1440;
  const b=(D.timeBlocks||[]).find(b=>b.id===_tbDrag.id);if(!b)return;
  if(_tbDrag.mode==='move'){
    const dur=((_tbDrag.orig.endMin-_tbDrag.orig.startMin)+1440)%1440;
    b.startMin=(((_tbDrag.orig.startMin+delta)%1440)+1440)%1440;
    b.endMin=(b.startMin+dur)%1440;
  }else if(_tbDrag.mode==='start'){
    b.startMin=((curMin%1440)+1440)%1440;
  }else{
    b.endMin=((curMin%1440)+1440)%1440;
  }
  buildClockSVG();
}
function _tbMouseUp(e){
  document.removeEventListener('mousemove',_tbMouseMove);
  document.body.style.cursor='';
  if(!_tbDrag)return;
  if(!_tbDrag.moved){const b=(D.timeBlocks||[]).find(b=>b.id===_tbDrag.id);_tbDrag=null;openTimeBlockModal(b);return;}
  save();_tbDrag=null;buildClockSVG();
}
let _tbClockTimer=null;
function mkTimeBlockCard(){
  const d=document.createElement('div');
  d.className='stat tb-clock-stat';
  d.style.cssText='padding:10px 12px;display:flex;flex-direction:column;align-items:center;position:relative';
  d.innerHTML=`<div id="tb-clock-wrap" style="width:100%;max-width:260px;aspect-ratio:1;margin:0 auto"></div>`;
  setTimeout(()=>{buildClockSVG();if(_tbClockTimer)clearInterval(_tbClockTimer);_tbClockTimer=setInterval(buildClockSVG,60000);},0);
  return d;
}
function buildClockSVG(){
  const wrap=document.getElementById('tb-clock-wrap');if(!wrap)return;
  const CX=110,CY=110;
  const now=new Date();const todayDow=now.getDay();
  const nowMin=now.getHours()*60+now.getMinutes();
  const cc=chartConf();
  const DAY_NAMES=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const timeStr=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const blocks=(D.timeBlocks||[]).filter(b=>!b.days||b.days.length===0||b.days.includes(todayDow));
  const pt=(r,deg)=>{const rad=deg*Math.PI/180;return [CX+r*Math.cos(rad),CY+r*Math.sin(rad)];};
  const ap=(r1,r2,a1,a2)=>{
    const span=((a2-a1)+360)%360,lg=span>180?1:0;
    const [ox1,oy1]=pt(r2,a1),[ox2,oy2]=pt(r2,a2);
    const [ix1,iy1]=pt(r1,a2),[ix2,iy2]=pt(r1,a1);
    return `M${ox1.toFixed(2)},${oy1.toFixed(2)} A${r2},${r2},0,${lg},1,${ox2.toFixed(2)},${oy2.toFixed(2)} L${ix1.toFixed(2)},${iy1.toFixed(2)} A${r1},${r1},0,${lg},0,${ix2.toFixed(2)},${iy2.toFixed(2)}Z`;
  };
  let arcs='',labels='',ticks='',defs='';
  // Tick marks
  for(let m=0;m<1440;m+=15){
    const a=_tbAngle(m),isHr=m%60===0,is6=m%360===0;
    const [x1,y1]=pt(TB_RO,a),[x2,y2]=pt(isHr?TB_RO-10:TB_RO-5,a);
    ticks+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${cc.ticks}" stroke-width="${is6?2:isHr?1.2:.6}" opacity="${is6?.9:isHr?.65:.4}"/>`;
  }
  // 4 cardinal time labels — outside ring
  [[0,'12A'],[360,'6A'],[720,'12P'],[1080,'6P']].forEach(([m,lbl])=>{
    const a=_tbAngle(m),[x,y]=pt(TB_RO+13,a);
    ticks+=`<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="7.5" font-weight="400" fill="${cc.ticks}" font-family="Inter,system-ui" opacity=".45">${lbl}</text>`;
  });
  // Detect time-range overlaps and assign radial lanes so both colors stay visible
  const _span=b=>((b.endMin-b.startMin)+1440)%1440;
  // Overlap check that correctly handles midnight-crossing blocks
  const _ovlp=(a,b)=>{
    const aSpan=_span(a),bSpan=_span(b);
    const relBS=((b.startMin-a.startMin)+1440)%1440;
    const relBE=((b.endMin-a.startMin)+1440)%1440;
    return relBS<aSpan||(relBE>0&&relBE<aSpan)||(relBS===0&&bSpan>0);
  };
  // Graph-coloring lane assignment — handles 3+ overlapping blocks correctly
  const ringW=TB_RO-TB_RI;
  const lanes=new Array(blocks.length).fill(0);
  // Sort indices by span desc so larger blocks get lower (outer) lanes
  const bySpan=[...blocks.keys()].sort((a,b)=>_span(blocks[b])-_span(blocks[a]));
  bySpan.forEach(i=>{
    const used=new Set();
    for(let j=0;j<blocks.length;j++){
      if(j!==i&&lanes[j]>=0&&_ovlp(blocks[i],blocks[j])) used.add(lanes[j]);
    }
    let lane=0; while(used.has(lane)) lane++;
    lanes[i]=lane;
  });
  const maxLane=Math.max(...lanes,0);
  const laneCount=maxLane+1;
  const laneH=ringW/laneCount;
  // Lane 0 = outermost, lane N = innermost
  const bRI=lanes.map(l=>Math.round(TB_RI+(laneCount-1-l)*laneH));
  const bRO=lanes.map(l=>Math.round(TB_RI+(laneCount-l)*laneH));
  const _visColor=(color)=>_readableColor(color);
  const byStart=[...blocks.keys()].sort((a,b)=>blocks[a].startMin-blocks[b].startMin);
  defs='<defs>';
  // Arc segments — draw arcs first, collect label metadata for collision pass
  const lblMeta=[];
  blocks.forEach((b,idx)=>{
    const span=_span(b);
    const a1=_tbAngle(b.startMin),a2=_tbAngle(b.endMin);
    const midMin=(b.startMin+span/2+1440)%1440;
    const midA=_tbAngle(midMin);
    const fmtT=m=>`${String(Math.floor((m%1440)/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
    const durMin=span%60,durHr=Math.floor(span/60);
    const durStr=(durHr?durHr+'h ':'')+(durMin?durMin+'m':'');
    const arcStroke=_isLightColor(b.color)?'stroke="rgba(0,0,0,0.18)" stroke-width="1.5"':_isDarkColor(b.color)?'stroke="rgba(255,255,255,0.25)" stroke-width="1.5"':'';
    arcs+=`<path d="${ap(bRI[idx],bRO[idx],a1,a2)}" fill="${b.color}" opacity=".68" ${arcStroke} style="cursor:grab;filter:drop-shadow(0 0 4px ${b.color}88)" data-tbid="${b.id}" data-tipname="${b.name.replace(/"/g,'&quot;')}" data-tiptime="${fmtT(b.startMin)} – ${fmtT(b.endMin)}" data-tipdur="${durStr}" data-tipcolor="${b.color}" class="tb-arc"/>`;
    lblMeta.push({b,span,midA});
  });
  // Feathered shadow seam at boundaries between same-color adjacent blocks
  for(let k=0;k<byStart.length;k++){
    const prev=byStart[(k-1+byStart.length)%byStart.length],cur=byStart[k];
    const gap=((blocks[cur].startMin-blocks[prev].endMin)+1440)%1440;
    if(gap<5&&blocks[cur].color===blocks[prev].color){
      const seamA=_tbAngle(blocks[prev].endMin),seamW=0.5;
      const ri=Math.min(bRI[prev],bRI[cur]),ro=Math.max(bRO[prev],bRO[cur]);
      const sid=`tbs${k}`;
      const [gx1,gy1]=_tbPt(TB_RM,seamA-seamW/2),[gx2,gy2]=_tbPt(TB_RM,seamA+seamW/2);
      defs+=`<linearGradient id="${sid}" gradientUnits="userSpaceOnUse" x1="${gx1.toFixed(1)}" y1="${gy1.toFixed(1)}" x2="${gx2.toFixed(1)}" y2="${gy2.toFixed(1)}"><stop offset="0%" stop-color="rgba(0,0,0,0)"/><stop offset="50%" stop-color="rgba(0,0,0,0.55)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></linearGradient>`;
      arcs+=`<path d="${ap(ri,ro,seamA-seamW/2,seamA+seamW/2)}" fill="url(#${sid})" style="pointer-events:none"/>`;
    }
  }
  defs+='</defs>';
  // Collision avoidance: larger blocks get inner tier, colliding smaller blocks pushed outward
  lblMeta.sort((a,b)=>b.span-a.span);
  lblMeta.forEach(l=>l.tier=0);
  for(let i=0;i<lblMeta.length;i++){
    for(let j=i+1;j<lblMeta.length;j++){
      const diff=Math.abs(((lblMeta[j].midA-lblMeta[i].midA+540)%360)-180);
      if(diff<22) lblMeta[j].tier=Math.max(lblMeta[j].tier,lblMeta[i].tier+1);
    }
  }
  // Render external radial labels
  lblMeta.forEach(({b,midA,tier})=>{
    const rLine=TB_RO+2,rText=TB_RO+16+tier*18;
    const [lx1,ly1]=pt(rLine,midA),[lx2,ly2]=pt(rText-4,midA),[tx,ty]=pt(rText+2,midA);
    const cosA=Math.cos(midA*Math.PI/180);
    const anchor=cosA>0.15?'start':cosA<-0.15?'end':'middle';
    const baseColor=_visColor(b.color);
    const lblColor=(_isLightColor(b.color)||_isDarkColor(b.color))?baseColor:_lighten(b.color,0.35);
    labels+=`<line x1="${lx1.toFixed(1)}" y1="${ly1.toFixed(1)}" x2="${lx2.toFixed(1)}" y2="${ly2.toFixed(1)}" stroke="${lblColor}" stroke-width="1.2" opacity=".7" style="pointer-events:none"/>`;
    labels+=`<text x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle" font-size="7.5" font-weight="700" letter-spacing=".05em" fill="${lblColor}" font-family="Inter,system-ui" style="pointer-events:none">${b.name}</text>`;
  });
  // Current time dot
  const nowA=_tbAngle(nowMin),[nx,ny]=pt(TB_RO-1,nowA);
  const nowDot=`<circle cx="${nx.toFixed(2)}" cy="${ny.toFixed(2)}" r="5" fill="${darkMode?'#fff':'#18181B'}" stroke="${darkMode?'#1A1A1E':'#fff'}" stroke-width="1.5" style="pointer-events:none"/>`;
  // Center time + day display — shows drag range while dragging
  const fmt=m=>`${String(Math.floor((m%1440)/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
  let centerMain=timeStr,centerSub=DAY_NAMES[todayDow].toUpperCase(),centerSubSize='8';
  let centerDur='';
  if(_tbDrag&&_tbDrag.moved){
    const db=(D.timeBlocks||[]).find(b=>b.id===_tbDrag.id);
    if(db){
      centerMain=fmt(db.startMin);centerSub=`→ ${fmt(db.endMin)}`;centerSubSize='10';
      const sp=((db.endMin-db.startMin)+1440)%1440;
      const dh=Math.floor(sp/60),dm=sp%60;
      centerDur=(dh?dh+'h ':'')+(dm?dm+'m':'');
    }
  }
  const center=`<text x="${CX}" y="${CY-(centerDur?14:10)}" text-anchor="middle" dominant-baseline="middle" font-size="20" font-weight="800" fill="${cc.overall}" font-family="Inter,system-ui" letter-spacing="-.02em" style="pointer-events:none">${centerMain}</text>
  <text x="${CX}" y="${CY+(centerDur?4:13)}" text-anchor="middle" dominant-baseline="middle" font-size="${centerSubSize}" font-weight="700" fill="${cc.ticks}" font-family="Inter,system-ui" letter-spacing=".06em" style="pointer-events:none">${centerSub}</text>
  ${centerDur?`<text x="${CX}" y="${CY+18}" text-anchor="middle" dominant-baseline="middle" font-size="8" font-weight="600" fill="${cc.ticks}" font-family="Inter,system-ui" letter-spacing=".05em" opacity=".7" style="pointer-events:none">${centerDur}</text>`:''}` ;
  // Invisible click target for adding new blocks
  const clickRing=`<path d="${ap(TB_RI,TB_RO,-90+360,-90)}" fill="transparent" style="cursor:crosshair" id="tb-ring-bg"/>`;
  const trackFill=`<path d="${ap(TB_RI,TB_RO,-90,270)}" fill="${darkMode?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)'}" style="pointer-events:none"/>`;
  const svg=`<svg id="tb-svg" viewBox="0 0 220 220" width="100%" height="100%" style="overflow:visible;display:block">
    <circle cx="${CX}" cy="${CY}" r="${TB_RO}" fill="none" stroke="${cc.grid}" stroke-width="1" opacity=".6"/>
    <circle cx="${CX}" cy="${CY}" r="${TB_RI}" fill="none" stroke="${cc.grid}" stroke-width=".6" opacity=".3"/>
    ${defs}${trackFill}${clickRing}${ticks}${arcs}${labels}${center}${nowDot}
  </svg>`;
  wrap.innerHTML=svg;
  wrap.querySelectorAll('.tb-arc').forEach(el=>{
    el.addEventListener('mousedown',_tbMouseDown);
    el.addEventListener('touchstart',e=>{
      e.preventDefault();
      const t=e.touches[0];
      _tbMouseDown({preventDefault:()=>{},stopPropagation:()=>{},currentTarget:e.currentTarget,clientX:t.clientX,clientY:t.clientY});
    },{passive:false});
  });
  if(!wrap._touchBound){
    wrap._touchBound=true;
    document.addEventListener('touchmove',e=>{
      if(!_tbDrag)return;
      e.preventDefault();
      const t=e.touches[0];
      _tbMouseMove({clientX:t.clientX,clientY:t.clientY});
    },{passive:false});
    document.addEventListener('touchend',e=>{
      if(!_tbDrag)return;
      _tbMouseUp({});
    });
  }
  // Custom instant tooltip
  if(!document.getElementById('tb-tip')){
    const t=document.createElement('div');t.id='tb-tip';
    t.style.cssText='position:fixed;display:none;z-index:600;pointer-events:none;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 13px;font-family:var(--font);box-shadow:0 8px 24px rgba(0,0,0,.13);white-space:nowrap;min-width:140px';
    document.body.appendChild(t);
  }
  const tbTip=document.getElementById('tb-tip');
  const svg_tip=document.getElementById('tb-svg');
  if(svg_tip){
    svg_tip.addEventListener('mouseover',e=>{
      const a=e.target.closest('.tb-arc');
      if(a&&a.dataset.tipname&&!_tbDrag){
        tbTip.innerHTML=`<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px"><span style="width:8px;height:8px;border-radius:50%;background:${a.dataset.tipcolor};flex-shrink:0;display:inline-block"></span><span style="font-size:12px;font-weight:700;color:var(--text1);letter-spacing:-.01em">${a.dataset.tipname}</span></div><div style="font-size:11px;color:var(--text2);font-weight:500;padding-left:15px">${a.dataset.tiptime}</div><div style="font-size:10px;color:var(--text3);font-weight:500;padding-left:15px;margin-top:2px">${a.dataset.tipdur}</div>`;
        tbTip.style.display='block';
      } else tbTip.style.display='none';
    });
    svg_tip.addEventListener('mousemove',e=>{if(tbTip.style.display==='block'){tbTip.style.left=(e.clientX+16)+'px';tbTip.style.top=(e.clientY-44)+'px';}});
    svg_tip.addEventListener('mouseout',e=>{if(!e.relatedTarget||!e.relatedTarget.closest||!e.relatedTarget.closest('.tb-arc'))tbTip.style.display='none';});
  }
  // Click on empty ring area to add
  const svg_el=document.getElementById('tb-svg');
  if(svg_el) svg_el.addEventListener('click',e=>{
    if(e.target.classList.contains('tb-arc')||_tbDrag?.moved) return;
    const clickMin=_tbMouseMin(e);
    const hit=(D.timeBlocks||[]).some(b=>{
      const span=((b.endMin-b.startMin)+1440)%1440;
      const rel=((clickMin-b.startMin)+1440)%1440;
      return rel<span;
    });
    if(!hit&&e.target.closest('svg')){
      const snap=Math.round(clickMin/15)*15;
      openTimeBlockModal({id:_tbUuid(),name:'',startMin:snap,endMin:(snap+60)%1440,color:TB_COLORS[0],days:[]});
    }
  });
}
function tbSelectGroup(name,color,gid){
  const inp=document.getElementById('tb-name');if(inp)inp.value=name;
  // Store the group id so the saved block can track it
  const overlay=document.getElementById('tb-overlay');
  if(overlay&&gid) overlay.dataset.gid=gid; else if(overlay) delete overlay.dataset.gid;
  document.querySelectorAll('#tb-overlay [data-color]').forEach(s=>s.style.border='2.5px solid transparent');
  const customBtn=document.getElementById('tb-custom-color');
  if(customBtn)customBtn.style.border='2.5px solid transparent';
  const m=[...document.querySelectorAll('#tb-overlay [data-color]')].find(s=>s.dataset.color===color);
  if(m){
    m.style.border='2.5px solid var(--text1)';
  } else if(customBtn){
    customBtn.style.border='2.5px solid var(--text1)';
    customBtn.dataset.custom=color;
    const ci=customBtn.querySelector('input');
    if(ci)ci.value=color;
  }
}
function openTimeBlockModal(block){
  closeTimeBlockModal();
  const isEdit=!!block&&!!(D.timeBlocks||[]).find(b=>b.id===block.id);
  const b=block||{id:_tbUuid(),name:'',startMin:480,endMin:540,color:TB_COLORS[0],days:[]};
  const toTime=m=>`${String(Math.floor((m%1440)/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
  const dayLabels=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayBtns=dayLabels.map((l,i)=>{const on=(b.days||[]).includes(i);return `<button type="button" class="tb-day-btn" data-day="${i}" onclick="tbToggleDay(this)" style="font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid var(--border2);background:${on?'var(--text1)':'var(--surface2)'};color:${on?'var(--bg)':'var(--text3)'};cursor:pointer;font-family:var(--font)">${l}</button>`;}).join('');
  const swatches=TB_COLORS.map(c=>`<button type="button" onclick="tbPickColor(this)" data-color="${c}" style="width:20px;height:20px;border-radius:50%;background:${c};border:2.5px solid ${b.color===c?'var(--text1)':'transparent'};cursor:pointer;outline:none;flex-shrink:0"></button>`).join('');
  const grps=(activeGroups()||[]);
  const groupChips=grps.map(g=>`<button type="button" onclick="tbSelectGroup('${g.name.replace(/'/g,"\\'")}','${g.color}','${g.id}')" style="font-size:9px;padding:2px 9px;border-radius:12px;border:1.5px solid ${g.color};background:${g.color}22;color:${g.color};cursor:pointer;font-family:var(--font);font-weight:600">${g.name}</button>`).join('');
  const overlay=document.createElement('div');
  overlay.id='tb-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box';
  overlay.onclick=e=>{if(e.target===overlay)closeTimeBlockModal();};
  overlay.innerHTML=`<div onclick="event.stopPropagation()" style="background:var(--surface);border-radius:var(--r);box-shadow:0 24px 56px rgba(0,0,0,.22);width:min(360px,100%);padding:22px 24px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <span style="font-size:13px;font-weight:700;color:var(--text1)">${isEdit?'Edit Block':'New Block'}</span>
      <button onclick="closeTimeBlockModal()" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;line-height:1;padding:2px 6px">✕</button>
    </div>
    ${grps.length?`<div style="margin-bottom:12px"><div style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">From Group</div><div style="display:flex;gap:5px;flex-wrap:wrap">${groupChips}</div></div>`:''}
    <div style="margin-bottom:14px"><div style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px">Block Name</div><input id="tb-name" type="text" placeholder="e.g. Morning Flow…" value="${b.name}" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r2);background:var(--surface2);color:var(--text1);font-family:var(--font);font-size:13px;box-sizing:border-box;outline:none;--ph-color:var(--text3)"/></div>
    <div style="display:flex;gap:10px;margin-bottom:14px">
      <div style="flex:1"><div style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px">Start</div><input id="tb-start" type="time" value="${toTime(b.startMin)}" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r2);background:var(--surface2);color:var(--text1);font-family:var(--font);font-size:13px;box-sizing:border-box;outline:none"/></div>
      <div style="flex:1"><div style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px">End</div><input id="tb-end" type="time" value="${toTime(b.endMin)}" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r2);background:var(--surface2);color:var(--text1);font-family:var(--font);font-size:13px;box-sizing:border-box;outline:none"/></div>
    </div>
    <div style="margin-bottom:14px"><div style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:7px">Color</div><div style="display:flex;gap:6px;flex-wrap:wrap">${swatches}<button type="button" id="tb-custom-color" style="width:20px;height:20px;border-radius:50%;background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);border:2.5px solid transparent;cursor:pointer;outline:none;flex-shrink:0;position:relative;overflow:hidden"><input type="color" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%"/></button></div></div>
    <div style="margin-bottom:20px"><div style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Repeat Days <span style="font-weight:400;opacity:.6;letter-spacing:0;text-transform:none">(empty = every day)</span></div><div id="tb-days" style="display:flex;gap:4px;flex-wrap:wrap">${dayBtns}</div></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      ${isEdit?`<button onclick="deleteTimeBlock('${b.id}')" style="background:none;border:1px solid var(--border2);border-radius:var(--r2);padding:7px 14px;cursor:pointer;color:var(--red);font-family:var(--font);font-size:12px">Delete</button>`:''}
      <button onclick="closeTimeBlockModal()" style="background:none;border:1px solid var(--border2);border-radius:var(--r2);padding:7px 14px;cursor:pointer;color:var(--text2);font-family:var(--font);font-size:12px">Cancel</button>
      <button onclick="saveTimeBlockFromModal('${b.id}')" style="background:var(--text1);border:none;border-radius:var(--r2);padding:7px 16px;cursor:pointer;color:var(--bg);font-family:var(--font);font-size:12px;font-weight:600">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  // Wire custom color input
  const customColorBtn=document.getElementById('tb-custom-color');
  if(customColorBtn){
    customColorBtn.querySelector('input').addEventListener('input',ev=>{
      document.querySelectorAll('#tb-overlay [data-color]').forEach(s=>s.style.border='2.5px solid transparent');
      customColorBtn.style.border='2.5px solid var(--text1)';
      customColorBtn.dataset.custom=ev.target.value;
    });
    // Pre-fill if block's current color is a custom (not in palette)
    if(!TB_COLORS.includes(b.color)){
      customColorBtn.querySelector('input').value=b.color;
      customColorBtn.dataset.custom=b.color;
      customColorBtn.style.border='2.5px solid var(--text1)';

function closeTimeBlockModal(){const el=document.getElementById('tb-overlay');if(el)el.remove();}
function tbToggleDay(btn){const on=btn.style.background.includes('var(--text1)');btn.style.background=on?'var(--surface2)':'var(--text1)';btn.style.color=on?'var(--text3)':'var(--bg)';}
function tbPickColor(btn){document.querySelectorAll('#tb-overlay [data-color]').forEach(b=>b.style.border='2.5px solid transparent');const cb=document.getElementById('tb-custom-color');if(cb)cb.style.border='2.5px solid transparent';btn.style.border='2.5px solid var(--text1)';}
function saveTimeBlockFromModal(id){
  const name=(document.getElementById('tb-name').value||'').trim();if(!name)return;
  const sv=document.getElementById('tb-start').value,ev=document.getElementById('tb-end').value;
  const [sh,sm]=(sv||'00:00').split(':').map(Number),[eh,em]=(ev||'01:00').split(':').map(Number);
  const colorBtn=document.querySelector('#tb-overlay [data-color][style*="var(--text1)"]');
  const customColorBtn=document.getElementById('tb-custom-color');
  const customActive=customColorBtn&&customColorBtn.style.border.includes('var(--text1)');
  const color=customActive?(customColorBtn.dataset.custom||TB_COLORS[0]):colorBtn?colorBtn.dataset.color:TB_COLORS[0];
  const days=[...document.querySelectorAll('#tb-days .tb-day-btn')].filter(b=>b.style.background.includes('var(--text1)')).map(b=>parseInt(b.dataset.day));
  const overlay=document.getElementById('tb-overlay');
  const existingBlock=(D.timeBlocks||[]).find(b=>b.id===id);
  const gid=(overlay&&overlay.dataset.gid)||(existingBlock&&existingBlock.gid)||null;
  saveTimeBlock({id,name,startMin:sh*60+sm,endMin:eh*60+em,color,days,gid});
  closeTimeBlockModal();
}
function saveTimeBlock(block){
  if(!D.timeBlocks)D.timeBlocks=[];
  const idx=D.timeBlocks.findIndex(b=>b.id===block.id);
  if(idx>=0)D.timeBlocks[idx]=block;else D.timeBlocks.push(block);
  save();buildClockSVG();
}
function deleteTimeBlock(id){
  D.timeBlocks=(D.timeBlocks||[]).filter(b=>b.id!==id);
  save();closeTimeBlockModal();buildClockSVG();
}

function mkStats(){
  const d=document.createElement('div');
  d.className='stats-row';
  d.id='stats-row';
  d.appendChild(mkTimeBlockCard());
  d.insertAdjacentHTML('beforeend',buildStats());

}

function _fathomStatLine(id,pct,label,hasData){
  if(!hasData) return `<div id="${id}"></div>`;
  const g=fathomGrade(pct);
  const c=fgColor(g);
  return `<div id="${id}" style="margin-top:7px;padding-top:7px;border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)">${label}</span>
    <span style="font-size:11px;font-weight:600;color:${c}">${g.label} &middot; ${pct}%</span>
  </div>`;
}

function gradeCol(pct,grades){return(grades.find(g=>pct>=g.min)||grades[grades.length-1]).color}
function _grpRows(groups,filterKey,getVal){
  return groups.filter(g=>g[filterKey]>0).map(g=>{
    const def={val:`${g.pct}%`,color:g.pct>=80?'var(--green)':g.pct>=50?'var(--amber)':'var(--red)'};
    const {val,color}=getVal?getVal(g):def;
    return `<div style="display:flex;align-items:center;justify-content:space-between;margin-top:5px">
      <span style="display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%">
        <span style="width:5px;height:5px;border-radius:50%;background:${g.color};flex-shrink:0;display:inline-block"></span>${esc(g.name)}
      </span>
      <span style="font-size:10px;font-weight:600;color:${color};min-width:34px;text-align:right;font-variant-numeric:tabular-nums">${val}</span>
    </div>`;
  }).join('');
}

function buildStats(){
  const {comp,poss,rate,dLeft,isCur,maxRate,monthGroups,futPoss}=monthStats();
  const rc=rate>=80?'var(--green)':rate>=50?'var(--amber)':'var(--red)';
  const {done:tDone,total:tTotal,pct:tPct,groups:tGroups}=todayStats();
  const todayGrade=tTotal===0?null:TODAY_GRADES.find(g=>tPct>=g.min);
  const monthGrade=poss===0?null:TIDE_GRADES.find(g=>rate>=g.min);
  const {pct:fmPct,hasData:fmHas}=fathomMonthStats();
  const {pct:ftPct,hasData:ftHas}=fathomTodayStats();
  const compGrpFn=g=>({val:`${g.gd}/${g.gt}`,color:'var(--text2)'});
  const maxGrpFn=g=>({val:`${g.maxRate}%`,color:'var(--text3)'});
  const maxGrade=isCur&&dLeft>0?TIDE_GRADES.find(g=>maxRate>=g.min):null;
  const nextGrade=monthGrade?TIDE_GRADES.slice().reverse().find(g=>g.min>monthGrade.min):TIDE_GRADES[TIDE_GRADES.length-1];
  const totalPoss=poss+futPoss;
  const neededForNext=nextGrade&&totalPoss>0?Math.ceil(nextGrade.min/100*totalPoss)-comp:null;
  const canReachNext=neededForNext!==null&&neededForNext>0;
  const gradeRows=monthGrade?TIDE_GRADES.filter(g=>g.min>monthGrade.min).map(g=>{const n=Math.ceil(g.min/100*totalPoss)-comp;return n>0?{letter:g.letter,name:g.name,count:n,color:g.color}:null;}).filter(Boolean):[];
  const bestPossibleLine=isCur&&dLeft>0?`<div id="sv-max-rate" style="margin-top:5px;padding-top:5px;border-top:1px solid var(--border2);font-size:11px;color:var(--text3)">Best possible: <span style="font-weight:600;color:var(--text2)">${maxRate}%</span>${maxGrade?" · <span style='font-weight:600;color:var(--text3)'>"+maxGrade.letter+" "+maxGrade.name+"</span>":""}</div><div id="sv-max-rate-grps">${_grpRows(monthGroups,'gt',maxGrpFn)}</div>`:`<div id="sv-max-rate"></div><div id="sv-max-rate-grps"></div>`;
  const nextGradeLine=canReachNext?'<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border2);font-size:11px;color:var(--text3);font-weight:600;cursor:default"'+(gradeRows.length?' onmouseenter="openGradeTip(event)" onmouseleave="closeGradeTip()" data-grades="'+JSON.stringify(gradeRows).replace(/"/g,'&quot;')+'"':'')+'>'+neededForNext+' more → '+nextGrade.letter+' '+nextGrade.name+((!isCur||dLeft===0)&&poss-comp>0?' · '+(poss-comp)+' missed':'')+'</div>':'';
  const maxRateBlock=`${bestPossibleLine}${nextGradeLine}`;
  return `
    <div class="stat"><div class="stat-lbl">${MON[CM]} SLIGHT EDGE</div>
      <div style="display:flex;align-items:baseline;gap:9px;margin-top:2px">
        <span class="stat-val" id="sv-month-grade" style="color:${monthGrade?monthGrade.color:'var(--text3)'}">${monthGrade?monthGrade.letter:'—'}</span>
        <span style="font-size:16px;font-weight:600;color:${monthGrade?monthGrade.color:'var(--text3)'}" id="sv-rate">${rate}%</span>
      </div>
      <div class="stat-sub" id="sv-month-sub">${monthGrade?monthGrade.name+' · '+comp+'/'+poss+' habits':''}</div>
      <div id="sv-month-grps">${_grpRows(monthGroups,'gt',g=>({val:`<span style="color:var(--text3)">${g.gd}/${g.gt}</span><span style="color:${gradeCol(g.pct,TIDE_GRADES)}"> · ${g.pct}%</span>`,color:'inherit'}))}</div>${_fathomStatLine('sv-fathom-month',fmPct,'Fathom',fmHas)}</div>
    <div class="stat"><div class="stat-lbl">Days Remaining</div><div class="stat-val">${dLeft}</div><div class="stat-sub">in ${MON[CM]}</div>${maxRateBlock}</div>
    <div class="stat"><div class="stat-lbl">Today's Slight Edge</div>
      <div style="display:flex;align-items:baseline;gap:9px;margin-top:2px">
        <span class="stat-val" id="sv-today-grade" style="color:${todayGrade?todayGrade.color:'var(--text3)'}">${todayGrade?todayGrade.letter:'—'}</span>
        ${todayGrade?`<span style="font-size:16px;font-weight:600;color:${todayGrade.color}" id="sv-today-rate">${tPct}%</span>`:'<span id="sv-today-rate"></span>'}
      </div>
      <div class="stat-sub" id="sv-today-sub">${todayGrade?`${todayGrade.name} · ${tDone}/${tTotal} habits`:'No habits set'}</div>

function updStats(){
  const {comp,poss,rate,isCur,dLeft,maxRate,monthGroups,futPoss}=monthStats();

  const monthGrade=poss===0?null:TIDE_GRADES.find(g=>rate>=g.min);

  if(todayGradeEl){

  }

    todayRateEl.textContent=todayGrade?tPct+'%':'';

  }
  if(todaySubEl) todaySubEl.textContent=todayGrade?`${todayGrade.name} · ${tDone}/${tTotal} habits`:'No habits set';
  if(todayGrpsEl) todayGrpsEl.innerHTML=_grpRows(tGroups,'total',g=>({val:`<span style="color:var(--text3)">${g.done}/${g.total}</span><span style="color:${gradeCol(g.pct,TODAY_GRADES)}"> · ${g.pct}%</span>`,color:'inherit'}));
  const fmEl=document.getElementById('sv-fathom-month');

  const {pct:ftPct,hasData:ftHas}=fathomTodayStats();

function _refreshPresetBtns(){
  const el=document.getElementById('hz-preset-btns');
  if(!el)return;
  const refLabels=window._lgRefLabels||['Perfection','Trajectory'];
  const grpNames=window._lgGrpNames||[];
  const bs=(key,labels,text)=>{
    const active=chartSoloState===key;
    return `<button class="btn chart-preset-btn" data-key="${key}" onclick="soloChart('${key}',window._lgPresets['${key}'])" style="font-size:9px;padding:1px 5px;opacity:${active?'1':'0.45'}">${text}</button>`;
  };
  // Build preset map: each preset = its own labels + P+T
  window._lgPresets={
    'PT': refLabels,
    'Overall': ['Overall',...refLabels],
  };
  grpNames.forEach(n=>{ window._lgPresets[n]=[n,...refLabels]; });
  let html=bs('PT',window._lgPresets['PT'],'P+T');
  html+=bs('Overall',window._lgPresets['Overall'],'Overall');
  grpNames.forEach(n=>{ html+=bs(n,window._lgPresets[n],n); });
  el.innerHTML=html;
}
function _applyChartVisibility(showFn){
  [chartInst,hzChartInst].forEach(ch=>{
    if(!ch)return;
    ch.data.datasets.forEach((ds,i)=>{
      const meta=ch.getDatasetMeta(i);
      meta.hidden=!showFn(ds.label);
    });
    ch.update('none');
  });
  _refreshPresetBtns();
}
function soloChart(key,labels){
  if(chartSoloState===key){chartSoloState=null;_applyChartVisibility(()=>true);}
  else{chartSoloState=key;const show=labels||(window._lgPresets&&window._lgPresets[key])||[];_applyChartVisibility(l=>show.includes(l));}
}
function toggleChartDs(label){
  chartSoloState=null;
  [chartInst,hzChartInst].forEach(ch=>{
    if(!ch)return;
    const i=ch.data.datasets.findIndex(d=>d.label===label);
    if(i>=0){const m=ch.getDatasetMeta(i);m.hidden=!m.hidden;ch.update('none');}
  });
  _refreshPresetBtns();
}
function buildChart(){
  const cv=document.getElementById('pc');
  if(!cv) return;
  if(chartInst){chartInst.destroy();chartInst=null}
  const {overall,groups}=cumulData();
  const days=dim(CY,CM);

  const datasets=[];
  datasets.push({label:'Perfection',data:(()=>{const fad=firstActiveDay();let mt=0;for(let d=1;d<=days;d++)mt+=dayProg(d).total;if(!mt)return[];const pts=[];let acc=0;for(let d=fad;d<=days;d++){acc+=dayProg(d).total;pts.push({x:d,y:Math.round(acc/mt*100)});}return pts;})(),borderColor:cc.ref,borderWidth:1.5,borderDash:[5,5],tension:0,fill:false,pointRadius:0,pointHoverRadius:0});
  datasets.push({label:'Trajectory',data:cumulProgressData(),borderColor:cc.cumul,backgroundColor:'transparent',borderWidth:1,borderDash:[4,3],tension:0,fill:false,pointRadius:0,pointHoverRadius:3});

  chartInst=new Chart(cv,{

// ── TBODY ──
function buildTBody(){
  const tbody=document.createElement('tbody');
  const days=dim(CY,CM);
  const todayD=now.getFullYear()===CY&&now.getMonth()===CM?now.getDate():-1;
  const isPastMonth=CY<now.getFullYear()||(CY===now.getFullYear()&&CM<now.getMonth());
  const spans=getWeekSpans(CY,CM);
  // Build a lookup: day → week number
  const dayWeek={};
  spans.forEach(s=>{for(let d=s.start;d<=s.end;d++) dayWeek[d]=s.week;});
  // Pre-compute per-week completion stats for grade badges
  const wkData={};
  spans.forEach(s=>{
    const lastD=todayD>0?Math.min(s.end,todayD):(isPastMonth?s.end:0);
    let wd=0,wt=0;
    for(let d=s.start;d<=lastD;d++){const{done:dd,total:dt}=dayProg(d);wd+=dd;wt+=dt;}
    wkData[s.week]=wt>0?{pct:Math.round(wd/wt*100),done:wd,total:wt}:null;
  });
  const weekAllStats={};
  allWeeksStats().forEach(w=>{weekAllStats[w.week]=w;});
  const totalHabitCols=activeGroups().reduce((s,g)=>s+g.habits.length+(editMode?1:0),0);
  for(let d=1;d<=days;d++){
    // Insert week separator before the first day of each week
    if(d===1||(new Date(CY,CM,d).getDay()===1)){
      const wn=dayWeek[d];
      const sepTr=document.createElement('tr');
      sepTr.className='week-sep-r';
      const sepTd=document.createElement('td');
      sepTd.className='sl week-sep-day';
      const wd=wkData[wn];
      const wg=wd&&wd.total>0?WEEK_GRADES.find(g=>wd.pct>=g.min):null;
      const weekStarted=todayD<0||spans.find(s=>s.week===wn)?.start<=todayD;
      const badgeStyle=wg?`background:${wg.color}20;color:${wg.color};border:1px solid ${wg.color}50`:`color:var(--text3);border:1px solid var(--border2)`;
      const badgeText=wg?`${wg.letter} · ${wd.pct}%`:'—';
      const wStats=weekAllStats[wn];
      const gd_json=wStats?JSON.stringify(wStats.groups.map(g=>({name:g.name,color:g.color,gd:g.gd,gt:g.gt,pct:g.pct}))).replace(/"/g,'&quot;'):'[]';
      const badge=weekStarted?`<span class="wk-badge" style="${badgeStyle};cursor:default" onmouseenter="openWeekGrpTip(event)" onmouseleave="closeWeekGrpTip()" data-groups="${gd_json}">${badgeText}</span>`:'';
      const wAarHas=!!getWeekAAR(wn);
      sepTd.innerHTML=`<span class="week-lbl-text">Week ${wn}</span>${badge}<button id="week-aar-btn-${wn}" class="aar-btn${wAarHas?' aar-has':''}" onclick="event.stopPropagation();openWeekAAR(${wn})" title="Weekly Review" style="display:inline;margin-left:6px;margin-top:0;padding:1px 5px">✎</button>`;
      const fillTd=document.createElement('td');
      fillTd.colSpan=totalHabitCols+2;
      sepTr.appendChild(sepTd);sepTr.appendChild(fillTd);
      tbody.appendChild(sepTr);
    }
    tbody.appendChild(buildDayRow(d,todayD));
  }
  return tbody;
}

function buildDayRow(d,todayD){
  const isToday=d===todayD;
  const isFuture=false;
  const dow=new Date(CY,CM,d).getDay();

  const tr=document.createElement('tr');
  tr.className='day-r'+(isToday?' today-r':'');
  tr.id=`dr-${d}`;

  // Day cell
  const dc=document.createElement('td');
  dc.className='sl day-c';
  dc.innerHTML=`<div class="day-num">${d}${isToday?'<span class="today-badge">Today</span>':''}</div><div class="day-dow">${DOW[dow]}</div>`;
  if(!isFuture){
    const aarBtn=document.createElement('button');
    aarBtn.id=`aar-btn-${d}`;
    aarBtn.className='aar-btn'+(getAAR(d)?' aar-has':'');
    aarBtn.title='After Action Review';
    aarBtn.textContent='✎';
    aarBtn.onclick=e=>{e.stopPropagation();openAAR(d)};
    dc.appendChild(aarBtn);
  }
  tr.appendChild(dc);

  // Habit cells
  activeGroups().forEach((g,gi)=>{
    g.habits.filter(h=>!h.archived).forEach((h,hi)=>{
      const td2=document.createElement('td');
      td2.className='chk-c'+(gi>0&&hi===0?' grp-sep':'')+(isFuture?' future':'');
      td2.id=`cc-${h.id}-${d}`;
      td2.dataset.color=g.color;
      const chk=isChk(h.id,d);
      const skp=isSkip(h.id,d);
      const foff=isFreqExcluded(h.id,d);
      const bstart=!chk&&h.startDate&&new Date(CY,CM,d)<new Date(h.startDate+'T00:00:00');
      if(foff) td2.classList.add('freq-off-c');
      td2.onclick=(isFuture||foff)?null:()=>doToggle(h.id,d,g.color);
      td2.innerHTML=`<div class="chk-box${chk?' checked':skp?' skipped':foff?' freq-off':bstart?' before-start':''}" id="cb-${h.id}-${d}" style="background:${chk?g.color:'transparent'};border-color:${chk?g.color:'var(--border)'}"></div>`;
      tr.appendChild(td2);
    });
    if(editMode){
      const sp=document.createElement('td');
      sp.style.width='60px';tr.appendChild(sp);
    }
  });

  // Summary
  const {done,total,pct}=dayProg(d);
  const dc2=document.createElement('td');
  dc2.className='sr sr-2 sum-c first-sum';dc2.id=`ds-${d}`;
  dc2.innerHTML=isFuture?`<span style="color:var(--text3)">—</span>`:`${done}<span style="color:var(--text3);font-size:9px">/${total}</span>`;
  tr.appendChild(dc2);

  const pc2=document.createElement('td');
  pc2.className='sr sr-1 sum-c';pc2.id=`ps-${d}`;
  if(!isFuture){
    const g=pct>0?(TODAY_GRADES.find(gr=>pct>=gr.min)||null):null;
    pc2.innerHTML=`<span style="color:${gradeCol(pct,TODAY_GRADES)};font-weight:600">${pct}%</span>`;
  } else {
    pc2.innerHTML=`<span style="color:var(--text3)">—</span>`;
  }
  tr.appendChild(pc2);
  return tr;
}

// ── TFOOT (analysis) ──
function buildTFoot(){
  const tf=document.createElement('tfoot');
  tf.className='ana-sep';
  const days=dim(CY,CM);

  const rows={
    done:mkAnaRow('Done'),
    rate:mkAnaRow('Slight Edge %'),
  };

  activeGroups().forEach((g,gi)=>{
    g.habits.forEach((h2,hi)=>{
      const {actual,pct,last}=habitProg(h2.id);
      const isSep=gi>0&&hi===0;
      const pctC=gradeCol(pct,TIDE_GRADES);
      const pctBg=pillBg(pct);

      const mkTd=(id,html,extra='')=>{
        const td2=document.createElement('td');
        td2.id=id;td2.innerHTML=html;
        if(isSep) td2.className='grp-sep';
        if(extra) td2.style.cssText=extra;
        return td2;
      };

      rows.done.appendChild(mkTd(`da-${h2.id}`,`${actual}<span style="color:var(--text3);font-size:9px">/${last}</span>`));
      const hGrade=TIDE_GRADES.find(g=>pct>=g.min);
      rows.rate.appendChild(mkTd(`ra-${h2.id}`,`<span class="pill" style="background:${pctBg};color:${pctC}">${hGrade?hGrade.letter+' ':''}${pct}%</span>`));
    });
    if(editMode){
      ['done','rate'].forEach(k=>{
        const td2=document.createElement('td');td2.style.width='60px';

      });

    rows[k].appendChild(e1);rows[k].appendChild(e2);
    tf.appendChild(rows[k]);
  });
  return tf;
}

function mkAnaRow(label){

  tr.appendChild(td2);

function doToggle(hid,day,color){
  toggle(hid,day);
  const box=document.getElementById(`cb-${hid}-${day}`);
  if(box){
    const chk=isChk(hid,day);
    const skp=isSkip(hid,day);
    box.classList.toggle('checked',chk);
    box.classList.toggle('skipped',skp);
    box.style.background=chk?color:'transparent';
    box.style.borderColor=chk?color:'var(--border)';
    box.classList.remove('chk-pop');
    if(chk) requestAnimationFrame(()=>box.classList.add('chk-pop'));
  }
}

function doSkipToggle(hid,day,color){
  skipToggle(hid,day);
  const chk=isChk(hid,day);
  const skp=isSkip(hid,day);
  const boxV=document.getElementById(`cb-${hid}-${day}`);
  const boxH=document.getElementById(`hzcb-${hid}-${day}`);
  [boxV,boxH].forEach(box=>{
    if(!box) return;
    box.classList.toggle('checked',chk);
    box.classList.toggle('skipped',skp);
    box.style.background=chk?color:'transparent';
    box.style.borderColor=chk?color:'var(--border)';
  });
  if(gridLayout==='vertical'){
    partialUpdate(hid,day);
  } else {
    const today=new Date();
    const isCurMo=today.getFullYear()===CY&&today.getMonth()===CM;
    const todayD=isCurMo?today.getDate():dim(CY,CM);
    let rowDone=0,rowTotal=0;
    for(let d=1;d<=todayD;d++){if(!isSkip(hid,d)){if(isChk(hid,d))rowDone++;rowTotal++;}}
    const pct=rowTotal?Math.floor(rowDone/rowTotal*100):0;
    const pc=(TIDE_GRADES.find(gr=>pct>=gr.min)||TIDE_GRADES[TIDE_GRADES.length-1]).color;
    const ds=document.getElementById(`hzds-${hid}`);
    const ps=document.getElementById(`hzps-${hid}`);
    if(ds) ds.innerHTML=`${rowDone}<span style="color:var(--text3);font-size:9px">/${rowTotal}</span>`;
    if(ps) ps.innerHTML=`<span style="color:${pc};font-weight:600">${pct}%</span><div style="margin-top:3px;height:3px;border-radius:2px;background:var(--border);overflow:hidden"><div style="height:100%;width:${pct}%;background:${pc};border-radius:2px"></div></div>`;
    const {pct:dp}=dayProg(day);
    const dpEl=document.getElementById(`hzdp-${day}`);
    if(dpEl){const c=gradeCol(dp,TODAY_GRADES);dpEl.innerHTML=`<span style="color:${c};font-size:10px;font-weight:700">${dp}%</span>`;}
    updStats();updateHzChart();updTide();
  }
}

function partialUpdate(hid,day){
  // day row summary
  const {done,total,pct}=dayProg(day);
  const ds=document.getElementById(`ds-${day}`);
  const ps=document.getElementById(`ps-${day}`);
  const today=new Date();
  const isCur=today.getFullYear()===CY&&today.getMonth()===CM;
  const isFuture=false;
  if(ds&&!isFuture) ds.innerHTML=`${done}<span style="color:var(--text3);font-size:9px">/${total}</span>`;

    const g=pct>0?(TODAY_GRADES.find(gr=>pct>=gr.min)||null):null;
    ps.innerHTML=`<span style="color:${gradeCol(pct,TODAY_GRADES)};font-weight:600">${pct}%</span>`;
  }
  // habit footer
  const {actual,pct:hp,last}=habitProg(hid);
  const pctC=gradeCol(hp,TIDE_GRADES);
  const pctBg=pillBg(hp);
  const da=document.getElementById(`da-${hid}`);

  // stats & chart
  updStats();
  updateChart();
  updTide();
}
